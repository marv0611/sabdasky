<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>SABDA — Balloon House Test v2</title>
<style>
  * { margin:0; padding:0; }
  body { overflow:hidden; background:#0a0612; }
  canvas { display:block; }
  #info {
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
    color:rgba(255,220,180,0.6); font:12px/1.4 'Georgia',serif;
    text-align:center; pointer-events:none; letter-spacing:0.5px;
  }
</style>
</head>
<body>
<div id="info">drag to orbit · scroll to zoom</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script>

// ── RENDERER ──
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
renderer.outputEncoding = THREE.sRGBEncoding;
document.body.appendChild(renderer.domElement);

// ── SCENE ──
const scene = new THREE.Scene();

// Dreamy evening sky
const skyCanvas = document.createElement('canvas');
skyCanvas.width = 512; skyCanvas.height = 512;
const skyCtx = skyCanvas.getContext('2d');
const skyGrad = skyCtx.createLinearGradient(0, 0, 0, 512);
skyGrad.addColorStop(0.0,  '#050215');
skyGrad.addColorStop(0.15, '#0f0830');
skyGrad.addColorStop(0.30, '#1e1050');
skyGrad.addColorStop(0.45, '#3a1868');
skyGrad.addColorStop(0.55, '#602878');
skyGrad.addColorStop(0.65, '#884060');
skyGrad.addColorStop(0.75, '#b86040');
skyGrad.addColorStop(0.85, '#d88838');
skyGrad.addColorStop(0.95, '#e8b050');
skyGrad.addColorStop(1.0,  '#f0cc70');
skyCtx.fillStyle = skyGrad;
skyCtx.fillRect(0, 0, 512, 512);
scene.background = new THREE.CanvasTexture(skyCanvas);
scene.fog = new THREE.FogExp2(0x1a0840, 0.004);

// ── CAMERA ──
const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 800);

// ── ORBIT ──
let isDrag = false, mpx = 0, mpy = 0;
let oTheta = 0, oPhi = 1.2, oR = 42;
const oTgt = new THREE.Vector3(0, 14, 0);

function updCam() {
  camera.position.x = oTgt.x + oR * Math.sin(oPhi) * Math.sin(oTheta);
  camera.position.y = oTgt.y + oR * Math.cos(oPhi);
  camera.position.z = oTgt.z + oR * Math.sin(oPhi) * Math.cos(oTheta);
  camera.lookAt(oTgt);
}
updCam();

const cv = renderer.domElement;
cv.addEventListener('pointerdown', e => { isDrag=true; mpx=e.clientX; mpy=e.clientY; });
cv.addEventListener('pointerup', () => isDrag=false);
cv.addEventListener('pointerleave', () => isDrag=false);
cv.addEventListener('pointermove', e => {
  if(!isDrag) return;
  oTheta -= (e.clientX-mpx)*0.005;
  oPhi = Math.max(0.3, Math.min(2.5, oPhi+(e.clientY-mpy)*0.005));
  mpx=e.clientX; mpy=e.clientY; updCam();
});
cv.addEventListener('wheel', e => { oR=Math.max(12,Math.min(100,oR+e.deltaY*0.06)); updCam(); });

// ── LIGHTING — warm sunset ──
scene.add(new THREE.AmbientLight(0xffeedd, 0.5));
const sun = new THREE.DirectionalLight(0xffd080, 1.4);
sun.position.set(-10, 25, 15); scene.add(sun);
const rim = new THREE.DirectionalLight(0xff8050, 0.6);
rim.position.set(12, 8, -10); scene.add(rim);
const fill = new THREE.DirectionalLight(0x6040a0, 0.25);
fill.position.set(0, -8, 0); scene.add(fill);

// ── ASSEMBLY ──
const assembly = new THREE.Group();
scene.add(assembly);

// ── HOUSE GLB ──
const loader = new THREE.GLTFLoader();
loader.load('assets/house_balloon.glb', gltf => {
  const house = gltf.scene;
  house.scale.setScalar(1.0);
  house.traverse(c => { if(c.isMesh) c.frustumCulled = false; });
  assembly.add(house);
}, undefined, () => {
  // Placeholder
  const box = new THREE.Mesh(
    new THREE.BoxGeometry(4, 4, 4),
    new THREE.MeshStandardMaterial({ color:0xd4a030, roughness:0.7 })
  );
  box.position.y = 2; assembly.add(box);
  const roof = new THREE.Mesh(
    new THREE.ConeGeometry(3.5, 2.5, 4),
    new THREE.MeshStandardMaterial({ color:0x8b4020, roughness:0.6 })
  );
  roof.position.y = 5.5; roof.rotation.y = Math.PI/4; assembly.add(roof);
});

// ════════════════════════════════════════════════════
// BALLOON CLUSTER — 500 dense-packed, vivid, saturated
// Matches reference: inverted teardrop, ALL touching
// ════════════════════════════════════════════════════

// Weighted color pool matching reference analysis:
// Heavy blue/cobalt, strong red, hot pink, purple, green, yellow, orange
const CP = [];
function addC(hex, n) { for(let i=0;i<n;i++) CP.push(hex); }
// Blues — 35%: royal, cobalt, bright, deep
addC(0x0050d0, 4); addC(0x0060e8, 4); addC(0x0070ff, 3); addC(0x1565c0, 3);
addC(0x0d47a1, 3); addC(0x2979ff, 3); addC(0x0055c0, 3); addC(0x003da8, 2);
addC(0x1e88e5, 2); addC(0x0288d1, 2); addC(0x039be5, 2); addC(0x2962ff, 2);
addC(0x00b0ff, 2);
// Reds — 20%: vivid scarlet, crimson
addC(0xe01020, 4); addC(0xd50000, 3); addC(0xc62828, 3); addC(0xff1744, 3);
addC(0xe53935, 3); addC(0xcc0000, 2); addC(0xff0000, 2);
// Hot pink / magenta — 15%
addC(0xff0080, 3); addC(0xf50057, 3); addC(0xc51162, 2); addC(0xff4081, 2);
addC(0xe91e63, 2); addC(0xd81b60, 2); addC(0xff006e, 1);
// Purple — 10%
addC(0x7b1fa2, 2); addC(0x6a1b9a, 2); addC(0x8e24aa, 2); addC(0x9c27b0, 2);
addC(0xaa00ff, 2);
// Green — 8%: emerald, kelly
addC(0x1b8a30, 2); addC(0x2e7d32, 2); addC(0x00c853, 2); addC(0x00b020, 2);
// Yellow — 7%
addC(0xffd600, 2); addC(0xffea00, 2); addC(0xf9a825, 2); addC(0xfdd835, 1);
// Orange — 5%
addC(0xff6d00, 2); addC(0xf57c00, 2); addC(0xff3d00, 1);

function rC() { return CP[Math.floor(Math.random() * CP.length)]; }

// Balloon geometry — teardrop shaped
const bGeo = new THREE.SphereGeometry(1, 12, 10);
const bp = bGeo.getAttribute('position');
for(let i = 0; i < bp.count; i++) {
  let x = bp.getX(i), y = bp.getY(i), z = bp.getZ(i);
  if(y < 0) {
    const f = Math.max(0.12, 1.0 + y * 0.35);
    bp.setX(i, x * f);
    bp.setZ(i, z * f);
    bp.setY(i, y * 1.4);
  } else {
    bp.setY(i, y * 0.92);
  }
}
bGeo.computeVertexNormals();

const kGeo = new THREE.ConeGeometry(0.07, 0.12, 4);

const BALLOON_N = 500;
const balloonGroup = new THREE.Group();
const bMeshes = [];
const bData = [];

// Cluster shape parameters
const CHIMNEY_Y = 10.0;
const CLUSTER_TOP = 29.0;
const CH = CLUSTER_TOP - CHIMNEY_Y; // 19 units tall

function clusterR(y) {
  const t = (y - CHIMNEY_Y) / CH; // 0=chimney, 1=top
  if(t < 0.15) {
    // Tight funnel
    return 0.5 + (t / 0.15) * 3.0;
  } else if(t < 0.8) {
    // Main bulge — fat sphere
    const bt = (t - 0.15) / 0.65;
    return 3.5 + Math.sin(bt * Math.PI) * 5.5;
  } else {
    // Top dome rounds off
    const dt = (t - 0.8) / 0.2;
    const r80 = 3.5 + Math.sin(((0.8-0.15)/0.65) * Math.PI) * 5.5;
    return r80 * Math.cos(dt * Math.PI * 0.5);
  }
}

// Pre-compute materials for reuse (batches of same color)
const matCache = new Map();
function getMat(color) {
  if(matCache.has(color)) return matCache.get(color);
  const m = new THREE.MeshStandardMaterial({
    color, roughness:0.2, metalness:0.05,
    emissive: new THREE.Color(color), emissiveIntensity:0.05,
  });
  matCache.set(color, m);
  return m;
}

for(let i = 0; i < BALLOON_N; i++) {
  // Y distribution — heavily weighted toward the bulge
  let y;
  const r = Math.random();
  if(r < 0.08) y = CHIMNEY_Y + Math.random() * CH * 0.15;           // funnel 8%
  else if(r < 0.82) y = CHIMNEY_Y + CH*0.15 + Math.random()*CH*0.65; // bulge 74%
  else y = CHIMNEY_Y + CH*0.8 + Math.random() * CH * 0.2;            // dome 18%
  
  const maxR = clusterR(y);
  const angle = Math.random() * Math.PI * 2;
  // Dense packing: bias toward filling the full radius
  const dist = Math.pow(Math.random(), 0.5) * maxR;
  
  const bx = Math.cos(angle) * dist;
  const bz = Math.sin(angle) * dist;
  
  // Scale: 0.5–0.85 so they pack tightly
  const tN = (y - CHIMNEY_Y) / CH;
  const sc = tN < 0.15 ? (0.35 + tN * 2.0) : (0.5 + Math.random() * 0.35);
  
  const color = rC();
  const mat = getMat(color);
  
  const balloon = new THREE.Mesh(bGeo, mat);
  balloon.position.set(bx, y, bz);
  balloon.scale.setScalar(sc);
  balloon.rotation.y = Math.random() * 6.28;
  balloon.frustumCulled = false;
  balloonGroup.add(balloon);
  bMeshes.push(balloon);
  
  // Knot
  const knot = new THREE.Mesh(kGeo, mat);
  knot.position.set(bx, y - sc * 1.3, bz);
  knot.rotation.x = Math.PI;
  balloonGroup.add(knot);
  
  bData.push({
    ox:bx, oy:y, oz:bz, ph:Math.random()*6.28,
    fx:0.15+Math.random()*0.25, fz:0.15+Math.random()*0.25, fy:0.3+Math.random()*0.25,
    ax:0.015+Math.random()*0.04, az:0.015+Math.random()*0.04, ay:0.008+Math.random()*0.025,
    knot, sc,
  });
}

// Strings from funnel balloons to chimney
const strMat = new THREE.LineBasicMaterial({ color:0xddccbb, transparent:true, opacity:0.3 });
const chimPt = new THREE.Vector3(0.3, CHIMNEY_Y - 0.5, 0);

for(let i = 0; i < BALLOON_N; i++) {
  const d = bData[i];
  if(d.oy > CHIMNEY_Y + CH * 0.35) continue;
  const start = new THREE.Vector3(d.ox, d.oy - d.sc * 1.3, d.oz);
  const mid = new THREE.Vector3(
    (start.x+chimPt.x)*0.5+(Math.random()-0.5)*0.2,
    (start.y+chimPt.y)*0.5,
    (start.z+chimPt.z)*0.5+(Math.random()-0.5)*0.2
  );
  const crv = new THREE.QuadraticBezierCurve3(chimPt.clone(), mid, start);
  balloonGroup.add(new THREE.Line(
    new THREE.BufferGeometry().setFromPoints(crv.getPoints(6)), strMat
  ));
}

assembly.add(balloonGroup);

// ── FLOATING DUST ──
const dustN = 120;
const dGeo = new THREE.BufferGeometry();
const dP = new Float32Array(dustN*3);
for(let i=0;i<dustN;i++){dP[i*3]=(Math.random()-0.5)*80;dP[i*3+1]=Math.random()*50;dP[i*3+2]=(Math.random()-0.5)*80;}
dGeo.setAttribute('position', new THREE.BufferAttribute(dP, 3));

const dtx = document.createElement('canvas'); dtx.width=32; dtx.height=32;
const dc = dtx.getContext('2d');
const dg = dc.createRadialGradient(16,16,0,16,16,16);
dg.addColorStop(0,'rgba(255,230,180,1)'); dg.addColorStop(0.4,'rgba(255,200,140,0.4)'); dg.addColorStop(1,'rgba(255,180,100,0)');
dc.fillStyle=dg; dc.fillRect(0,0,32,32);

scene.add(new THREE.Points(dGeo, new THREE.PointsMaterial({
  map:new THREE.CanvasTexture(dtx), size:0.5, transparent:true, opacity:0.35,
  blending:THREE.AdditiveBlending, depthWrite:false, sizeAttenuation:true,
})));

// ════════════════════════════════════════════════════
// WIND & MOVEMENT
// ════════════════════════════════════════════════════
let windAngle = Math.random()*6.28, windStr = 0.25;
let windTA = windAngle, windTS = 0.25, windTmr = 0;
let thermalPh = Math.random()*6.28;

const clock = new THREE.Clock();
let elapsed = 0;

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  elapsed += dt;
  
  // Wind
  windTmr -= dt;
  if(windTmr<=0) { windTA+=(Math.random()-0.5)*1.0; windTS=0.1+Math.random()*0.4; windTmr=5+Math.random()*10; }
  windAngle += (windTA-windAngle)*0.004;
  windStr += (windTS-windStr)*0.008;
  const wx = Math.cos(windAngle)*windStr*dt;
  const wz = Math.sin(windAngle)*windStr*dt;
  
  // Thermals
  thermalPh += dt*0.12;
  const thermal = Math.sin(thermalPh)*0.002;
  
  // Assembly drift
  assembly.position.x += wx*0.7;
  assembly.position.z += wz*0.7;
  assembly.position.y += (0.008+thermal)*dt*60;
  
  // Tilt
  const tilt = windStr*0.025;
  assembly.rotation.z += (Math.sin(windAngle)*tilt - assembly.rotation.z)*0.015;
  assembly.rotation.x += (Math.cos(windAngle)*tilt - assembly.rotation.x)*0.015;
  assembly.rotation.y += dt*0.008;
  
  // Per-balloon micro-sway (very subtle — packed tight)
  for(let i=0;i<BALLOON_N;i++){
    const d=bData[i], m=bMeshes[i], t=elapsed*d.fx+d.ph;
    m.position.x = d.ox + Math.sin(t)*d.ax;
    m.position.z = d.oz + Math.cos(t*0.9+0.7)*d.az;
    m.position.y = d.oy + Math.sin(t*d.fy+d.ph*2)*d.ay;
    d.knot.position.x=m.position.x; d.knot.position.y=m.position.y-d.sc*1.3; d.knot.position.z=m.position.z;
  }
  
  // Dust
  const dp=dGeo.getAttribute('position');
  for(let i=0;i<dustN;i++){dp.setY(i,dp.getY(i)+0.003);if(dp.getY(i)>50)dp.setY(i,-2);}
  dp.needsUpdate=true;
  
  // Camera follows gently
  oTgt.x += (assembly.position.x-oTgt.x)*0.015;
  oTgt.y += ((assembly.position.y+16)-oTgt.y)*0.015;
  oTgt.z += (assembly.position.z-oTgt.z)*0.015;
  updCam();
  
  // Light pulse
  sun.intensity = 1.3+Math.sin(elapsed*0.015)*0.15;
  
  renderer.render(scene, camera);
}

animate();

window.addEventListener('resize', () => {
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

</script>
</body>
</html>
