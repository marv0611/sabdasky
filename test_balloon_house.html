<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>SABDA — Balloon House v5 (Sprite)</title>
<style>*{margin:0;padding:0}body{overflow:hidden;background:#000}canvas{display:block}
#info{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);color:rgba(255,220,180,0.5);font:11px Georgia,serif;text-align:center;pointer-events:none}</style>
</head>
<body>
<div id="info">drag to orbit · scroll to zoom · house drifts on wind</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>

const R = new THREE.WebGLRenderer({ antialias:true });
R.setSize(innerWidth, innerHeight);
R.setPixelRatio(Math.min(devicePixelRatio, 2));
R.toneMapping = THREE.LinearToneMapping;
R.toneMappingExposure = 1.0;
R.outputEncoding = THREE.sRGBEncoding;
document.body.appendChild(R.domElement);

const scene = new THREE.Scene();

// Evening sky
const skC = document.createElement('canvas'); skC.width=512; skC.height=512;
const sk = skC.getContext('2d');
const sg = sk.createLinearGradient(0,0,0,512);
sg.addColorStop(0,'#030110'); sg.addColorStop(0.10,'#080420');
sg.addColorStop(0.22,'#140a38'); sg.addColorStop(0.35,'#221050');
sg.addColorStop(0.48,'#381860'); sg.addColorStop(0.58,'#582468');
sg.addColorStop(0.68,'#783858'); sg.addColorStop(0.78,'#a85838');
sg.addColorStop(0.88,'#c88028'); sg.addColorStop(1.0,'#d8a830');
sk.fillStyle=sg; sk.fillRect(0,0,512,512);
scene.background = new THREE.CanvasTexture(skC);
scene.fog = new THREE.FogExp2(0x100630, 0.002);

// Camera + orbit
const cam = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.1, 800);
let drag=false, mx=0, my=0, oT=0.15, oP=1.15, oRad=35;
const oC = new THREE.Vector3(0, 8, 0);
function uc(){
  cam.position.set(
    oC.x+oRad*Math.sin(oP)*Math.sin(oT),
    oC.y+oRad*Math.cos(oP),
    oC.z+oRad*Math.sin(oP)*Math.cos(oT));
  cam.lookAt(oC);
}
uc();
const cv=R.domElement;
cv.onpointerdown=e=>{drag=true;mx=e.clientX;my=e.clientY};
cv.onpointerup=cv.onpointerleave=()=>drag=false;
cv.onpointermove=e=>{if(!drag)return;oT-=(e.clientX-mx)*0.005;oP=Math.max(0.3,Math.min(2.5,oP+(e.clientY-my)*0.005));mx=e.clientX;my=e.clientY;uc()};
cv.onwheel=e=>{oRad=Math.max(8,Math.min(100,oRad+e.deltaY*0.04));uc()};

// Lighting
scene.add(new THREE.AmbientLight(0xfff8f0, 0.6));
const sun = new THREE.DirectionalLight(0xfff0d0, 0.6);
sun.position.set(-5, 15, 10); scene.add(sun);

// ── BALLOON HOUSE SPRITE ──
// Load the reference image as a texture on a Sprite
// Sprite always faces camera = looks correct from any angle in 360° room
const tex = new THREE.TextureLoader().load('assets/balloon_house_sprite.png', t => {
  t.encoding = THREE.sRGBEncoding;
  // Image is 1024 x 1329 → aspect ratio 1024/1329 ≈ 0.77
  const aspect = 1024 / 1329;
  const height = 18; // world units tall
  const width = height * aspect;
  sprite.scale.set(width, height, 1);
  console.log('Sprite loaded:', width.toFixed(1), '×', height, 'units');
});

const spriteMat = new THREE.SpriteMaterial({
  map: tex,
  transparent: true,
  alphaTest: 0.05,  // clean edges
  fog: true,
  sizeAttenuation: true,
});

const sprite = new THREE.Sprite(spriteMat);
sprite.position.set(0, 8, 0);
sprite.frustumCulled = false;
scene.add(sprite);

// ── FLOATING DUST ──
const dN=100, dG=new THREE.BufferGeometry(), dP=new Float32Array(dN*3);
for(let i=0;i<dN;i++){dP[i*3]=(Math.random()-0.5)*60;dP[i*3+1]=Math.random()*40-5;dP[i*3+2]=(Math.random()-0.5)*60;}
dG.setAttribute('position',new THREE.BufferAttribute(dP,3));
const dtx=document.createElement('canvas');dtx.width=32;dtx.height=32;
const dc=dtx.getContext('2d'),dg=dc.createRadialGradient(16,16,0,16,16,16);
dg.addColorStop(0,'rgba(255,230,180,1)');dg.addColorStop(0.4,'rgba(255,200,140,0.3)');dg.addColorStop(1,'rgba(255,180,100,0)');
dc.fillStyle=dg;dc.fillRect(0,0,32,32);
scene.add(new THREE.Points(dG,new THREE.PointsMaterial({
  map:new THREE.CanvasTexture(dtx),size:0.4,transparent:true,opacity:0.25,
  blending:THREE.AdditiveBlending,depthWrite:false,sizeAttenuation:true
})));

// ════════════════════════════════════════════════════
// WIND & HOT AIR BALLOON MOVEMENT
// ════════════════════════════════════════════════════
let wA=Math.random()*6.28, wS=0.2, wTA=wA, wTS=0.2, wTm=0;
let thPh=Math.random()*6.28;
const clk=new THREE.Clock(); let el=0;

function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clk.getDelta(),0.05); el+=dt;
  
  // Wind changes direction/strength slowly
  wTm-=dt;
  if(wTm<=0){wTA+=(Math.random()-0.5)*0.8;wTS=0.08+Math.random()*0.3;wTm=6+Math.random()*12;}
  wA+=(wTA-wA)*0.003; wS+=(wTS-wS)*0.006;
  
  // Thermals — gentle vertical bobbing
  thPh+=dt*0.1;
  const thermal = Math.sin(thPh)*0.0015;
  
  // Apply wind + rise to sprite
  sprite.position.x += Math.cos(wA)*wS*dt*0.6;
  sprite.position.z += Math.sin(wA)*wS*dt*0.6;
  sprite.position.y += (0.005+thermal)*dt*60;
  
  // Dust
  const dp=dG.getAttribute('position');
  for(let i=0;i<dN;i++){dp.setY(i,dp.getY(i)+0.002);if(dp.getY(i)>35)dp.setY(i,-5);}
  dp.needsUpdate=true;
  
  // Camera gently follows
  oC.x+=(sprite.position.x-oC.x)*0.012;
  oC.y+=((sprite.position.y)-oC.y)*0.012;
  oC.z+=(sprite.position.z-oC.z)*0.012;
  uc();
  
  R.render(scene,cam);
}
animate();

onresize=()=>{cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();R.setSize(innerWidth,innerHeight)};

</script>
</body>
</html>
