<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>SABDA Murmuration Test</title>
<style>
body { margin: 0; overflow: hidden; background: #000; }
canvas { display: block; }
#info { position: absolute; top: 10px; width: 100%; text-align: center; color: #fff; font-family: monospace; font-size: 13px; text-shadow: 0 0 4px #000; z-index: 10; }
</style>
</head>
<body>
<div id="info">SABDA Murmuration Test — move mouse to disturb birds</div>

<!-- Position shader -->
<script id="fragmentShaderPosition" type="x-shader/x-fragment">
uniform float time;
uniform float delta;
void main() {
  vec2 uv = gl_FragCoord.xy / resolution.xy;
  vec4 tmpPos = texture2D( texturePosition, uv );
  vec3 position = tmpPos.xyz;
  vec3 velocity = texture2D( textureVelocity, uv ).xyz;
  float phase = tmpPos.w;
  phase = mod( ( phase + delta +
    length( velocity.xz ) * delta * 3. +
    max( velocity.y, 0.0 ) * delta * 6. ), 62.83 );
  gl_FragColor = vec4( position + velocity * delta * 15., phase );
}
</script>

<!-- Velocity shader (boids brain) -->
<script id="fragmentShaderVelocity" type="x-shader/x-fragment">
uniform float time;
uniform float testing;
uniform float delta;
uniform float separationDistance;
uniform float alignmentDistance;
uniform float cohesionDistance;
uniform float freedomFactor;
uniform vec3 predator;

const float width = resolution.x;
const float height = resolution.y;
const float PI = 3.141592653589793;
const float PI_2 = PI * 2.0;

float zoneRadius = 40.0;
float zoneRadiusSquared = 1600.0;
float separationThresh = 0.45;
float alignmentThresh = 0.65;

const float UPPER_BOUNDS = BOUNDS;
const float LOWER_BOUNDS = -UPPER_BOUNDS;
const float SPEED_LIMIT = 9.0;

float rand( vec2 co ){
  return fract( sin( dot( co.xy, vec2(12.9898,78.233) ) ) * 43758.5453 );
}

void main() {
  zoneRadius = separationDistance + alignmentDistance + cohesionDistance;
  separationThresh = separationDistance / zoneRadius;
  alignmentThresh = ( separationDistance + alignmentDistance ) / zoneRadius;
  zoneRadiusSquared = zoneRadius * zoneRadius;

  vec2 uv = gl_FragCoord.xy / resolution.xy;
  vec3 birdPosition, birdVelocity;
  vec3 selfPosition = texture2D( texturePosition, uv ).xyz;
  vec3 selfVelocity = texture2D( textureVelocity, uv ).xyz;

  float dist;
  vec3 dir;
  float distSquared;
  float f;
  float percent;
  vec3 velocity = selfVelocity;
  float limit = SPEED_LIMIT;

  // Predator avoidance
  dir = predator * UPPER_BOUNDS - selfPosition;
  dir.z = 0.;
  dist = length( dir );
  distSquared = dist * dist;
  float preyRadius = 150.0;
  float preyRadiusSq = preyRadius * preyRadius;
  if ( dist < preyRadius ) {
    f = ( distSquared / preyRadiusSq - 1.0 ) * delta * 100.;
    velocity += normalize( dir ) * f;
    limit += 5.0;
  }

  // Attract to center
  vec3 central = vec3( 0., 0., 0. );
  dir = selfPosition - central;
  dist = length( dir );
  dir.y *= 2.5;
  velocity -= normalize( dir ) * delta * 5.;

  // Boids interactions
  for ( float y = 0.0; y < height; y++ ) {
    for ( float x = 0.0; x < width; x++ ) {
      vec2 ref = vec2( x + 0.5, y + 0.5 ) / resolution.xy;
      birdPosition = texture2D( texturePosition, ref ).xyz;
      dir = birdPosition - selfPosition;
      dist = length( dir );
      if ( dist < 0.0001 ) continue;
      distSquared = dist * dist;
      if ( distSquared > zoneRadiusSquared ) continue;
      percent = distSquared / zoneRadiusSquared;

      if ( percent < separationThresh ) {
        f = ( separationThresh / percent - 1.0 ) * delta;
        velocity -= normalize( dir ) * f;
      } else if ( percent < alignmentThresh ) {
        float threshDelta = alignmentThresh - separationThresh;
        float adjustedPercent = ( percent - separationThresh ) / threshDelta;
        birdVelocity = texture2D( textureVelocity, ref ).xyz;
        f = ( 0.5 - cos( adjustedPercent * PI_2 ) * 0.5 + 0.5 ) * delta;
        velocity += normalize( birdVelocity ) * f;
      } else {
        float threshDelta = 1.0 - alignmentThresh;
        float adjustedPercent;
        if( threshDelta == 0. ) adjustedPercent = 1.;
        else adjustedPercent = ( percent - alignmentThresh ) / threshDelta;
        f = ( 0.5 - ( cos( adjustedPercent * PI_2 ) * -0.5 + 0.5 ) ) * delta;
        velocity += normalize( dir ) * f;
      }
    }
  }

  if ( length( velocity ) > limit ) {
    velocity = normalize( velocity ) * limit;
  }
  gl_FragColor = vec4( velocity, 1.0 );
}
</script>

<!-- Bird vertex shader -->
<script type="x-shader/x-vertex" id="birdVS">
attribute vec2 reference;
attribute float birdVertex;
attribute vec3 birdColor;
uniform sampler2D texturePosition;
uniform sampler2D textureVelocity;
varying vec4 vColor;
varying float z;
uniform float time;

void main() {
  vec4 tmpPos = texture2D( texturePosition, reference );
  vec3 pos = tmpPos.xyz;
  vec3 velocity = normalize(texture2D( textureVelocity, reference ).xyz);
  vec3 newPosition = position;

  if ( birdVertex == 4.0 || birdVertex == 7.0 ) {
    newPosition.y = sin( tmpPos.w ) * 5.;
  }

  newPosition = mat3( modelMatrix ) * newPosition;

  velocity.z *= -1.;
  float xz = length( velocity.xz );
  float xyz = 1.;
  float x = sqrt( 1. - velocity.y * velocity.y );
  float cosry = velocity.x / xz;
  float sinry = velocity.z / xz;
  float cosrz = x / xyz;
  float sinrz = velocity.y / xyz;

  mat3 maty = mat3( cosry, 0, -sinry, 0, 1, 0, sinry, 0, cosry );
  mat3 matz = mat3( cosrz, sinrz, 0, -sinrz, cosrz, 0, 0, 0, 1 );

  newPosition = maty * matz * newPosition;
  newPosition += pos;
  z = newPosition.z;
  vColor = vec4( birdColor, 1.0 );
  gl_Position = projectionMatrix * viewMatrix * vec4( newPosition, 1.0 );
}
</script>

<!-- Bird fragment shader — dark silhouette style for dreamy sky -->
<script type="x-shader/x-fragment" id="birdFS">
varying vec4 vColor;
varying float z;
uniform vec3 color;
void main() {
  float depth = 0.15 + ( 1000. - z ) / 2000.;
  depth = clamp(depth, 0.05, 0.35);
  gl_FragColor = vec4( depth, depth * 0.9, depth * 1.1, 1.0 );
}
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── Inline GPUComputationRenderer (adapted from Three.js addons) ──
(function() {
  const GPUComputationRenderer = function( sizeX, sizeY, renderer ) {
    this.variables = [];
    this.currentTextureIndex = 0;
    let dataType = THREE.FloatType;
    const passThruUniforms = { passThruTexture: { value: null } };
    const passThruShader = createShaderMaterial( getPassThroughFragmentShader(), passThruUniforms );
    const mesh = new THREE.Mesh( new THREE.PlaneGeometry(2,2), passThruShader );
    const passScene = new THREE.Scene();
    passScene.add(mesh);
    const passCamera = new THREE.Camera();
    passCamera.position.z = 1;

    this.setDataType = function(type){ dataType = type; return this; };

    this.addVariable = function( variableName, computeFragmentShader, initialValueTexture ) {
      const material = this.createShaderMaterial( computeFragmentShader );
      const variable = {
        name: variableName, initialValueTexture: initialValueTexture,
        material: material, dependencies: null, renderTargets: [],
        wrapS: null, wrapT: null, minFilter: THREE.NearestFilter, magFilter: THREE.NearestFilter
      };
      this.variables.push( variable );
      return variable;
    };

    this.setVariableDependencies = function( variable, dependencies ) {
      variable.dependencies = dependencies;
    };

    this.init = function() {
      if ( renderer.capabilities.maxVertexTextures === 0 ) return 'No support for vertex shader textures.';
      for ( let i = 0; i < this.variables.length; i++ ) {
        const variable = this.variables[i];
        variable.renderTargets[0] = this.createRenderTarget( sizeX, sizeY, variable.wrapS, variable.wrapT, variable.minFilter, variable.magFilter );
        variable.renderTargets[1] = this.createRenderTarget( sizeX, sizeY, variable.wrapS, variable.wrapT, variable.minFilter, variable.magFilter );
        this.renderTexture( variable.initialValueTexture, variable.renderTargets[0] );
        this.renderTexture( variable.initialValueTexture, variable.renderTargets[1] );
        const material = variable.material;
        const uniforms = material.uniforms;
        if ( variable.dependencies !== null ) {
          for ( let d = 0; d < variable.dependencies.length; d++ ) {
            const depVar = variable.dependencies[d];
            if ( depVar.name !== variable.name ) {
              let found = false;
              for ( let j = 0; j < this.variables.length; j++ ) {
                if ( depVar.name === this.variables[j].name ) { found = true; break; }
              }
              if ( !found ) return 'Variable dependency not found. Variable=' + variable.name + ', dependency=' + depVar.name;
            }
            uniforms[ depVar.name ] = { value: null };
            material.fragmentShader = '\nuniform sampler2D ' + depVar.name + ';\n' + material.fragmentShader;
          }
        }
      }
      this.currentTextureIndex = 0;
      return null;
    };

    this.compute = function() {
      const currentTextureIndex = this.currentTextureIndex;
      const nextTextureIndex = currentTextureIndex === 0 ? 1 : 0;
      for ( let i = 0; i < this.variables.length; i++ ) {
        const variable = this.variables[i];
        if ( variable.dependencies !== null ) {
          const uniforms = variable.material.uniforms;
          for ( let d = 0; d < variable.dependencies.length; d++ ) {
            const depVar = variable.dependencies[d];
            uniforms[ depVar.name ].value = depVar.renderTargets[ currentTextureIndex ].texture;
          }
        }
        this.doRenderTarget( variable.material, variable.renderTargets[ nextTextureIndex ] );
      }
      this.currentTextureIndex = nextTextureIndex;
    };

    this.getCurrentRenderTarget = function( variable ) {
      return variable.renderTargets[ this.currentTextureIndex ];
    };

    function addResolutionDefine( materialShader ) {
      materialShader.defines.resolution = 'vec2( ' + sizeX.toFixed(1) + ', ' + sizeY.toFixed(1) + ' )';
    }

    function createShaderMaterial( computeFragmentShader, uniforms ) {
      uniforms = uniforms || {};
      const material = new THREE.ShaderMaterial({
        uniforms: uniforms,
        vertexShader: 'void main() { gl_Position = vec4( position, 1.0 ); }',
        fragmentShader: computeFragmentShader
      });
      addResolutionDefine( material );
      return material;
    }

    this.createShaderMaterial = createShaderMaterial;

    this.createRenderTarget = function( sizeXTexture, sizeYTexture, wrapS, wrapT, minFilter, magFilter ) {
      sizeXTexture = sizeXTexture || sizeX;
      sizeYTexture = sizeYTexture || sizeY;
      wrapS = wrapS || THREE.ClampToEdgeWrapping;
      wrapT = wrapT || THREE.ClampToEdgeWrapping;
      minFilter = minFilter || THREE.NearestFilter;
      magFilter = magFilter || THREE.NearestFilter;
      return new THREE.WebGLRenderTarget( sizeXTexture, sizeYTexture, {
        wrapS: wrapS, wrapT: wrapT, minFilter: minFilter, magFilter: magFilter,
        format: THREE.RGBAFormat, type: dataType, depthBuffer: false
      });
    };

    this.createTexture = function() {
      const data = new Float32Array( sizeX * sizeY * 4 );
      const texture = new THREE.DataTexture( data, sizeX, sizeY, THREE.RGBAFormat, THREE.FloatType );
      texture.needsUpdate = true;
      return texture;
    };

    this.renderTexture = function( input, output ) {
      passThruUniforms.passThruTexture.value = input;
      this.doRenderTarget( passThruShader, output );
      passThruUniforms.passThruTexture.value = null;
    };

    this.doRenderTarget = function( material, output ) {
      const currentRT = renderer.getRenderTarget();
      mesh.material = material;
      renderer.setRenderTarget( output );
      renderer.render( passScene, passCamera );
      mesh.material = passThruShader;
      renderer.setRenderTarget( currentRT );
    };

    function getPassThroughFragmentShader() {
      return 'uniform sampler2D passThruTexture;\nvoid main() {\n  vec2 uv = gl_FragCoord.xy / resolution.xy;\n  gl_FragColor = texture2D( passThruTexture, uv );\n}\n';
    }
  };
  window.GPUComputationRenderer = GPUComputationRenderer;
})();

// ══════════════════════════════════════════════
// SABDA MURMURATION TEST
// ══════════════════════════════════════════════

const WIDTH = 32;
const BIRDS = WIDTH * WIDTH; // 1024 birds
const BOUNDS = 800, BOUNDS_HALF = BOUNDS / 2;

let container, camera, scene, renderer;
let mouseX = 10000, mouseY = 10000;
let windowHalfX = window.innerWidth / 2;
let windowHalfY = window.innerHeight / 2;
let last = performance.now();
let gpuCompute, velocityVariable, positionVariable;
let positionUniforms, velocityUniforms, birdUniforms;

init();

function init() {
  // Renderer
  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio( window.devicePixelRatio );
  renderer.setSize( window.innerWidth, window.innerHeight );
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.0;
  document.body.appendChild( renderer.domElement );

  // Camera — looking at the murmuration
  camera = new THREE.PerspectiveCamera( 75, window.innerWidth / window.innerHeight, 1, 3000 );
  camera.position.z = 350;

  // Scene
  scene = new THREE.Scene();

  // Gradient sky background — dreamy sunset
  const skyCanvas = document.createElement('canvas');
  skyCanvas.width = 1; skyCanvas.height = 512;
  const skyCtx = skyCanvas.getContext('2d');
  const grad = skyCtx.createLinearGradient(0, 0, 0, 512);
  grad.addColorStop(0.0, '#1a0a2e');   // deep purple top
  grad.addColorStop(0.25, '#3d1560'); // violet
  grad.addColorStop(0.45, '#8b3a62'); // magenta
  grad.addColorStop(0.6, '#d4726a');  // salmon
  grad.addColorStop(0.75, '#f0a06c'); // warm orange
  grad.addColorStop(0.9, '#e8c89e');  // pale gold
  grad.addColorStop(1.0, '#c9a882');  // warm haze
  skyCtx.fillStyle = grad;
  skyCtx.fillRect(0, 0, 1, 512);
  const skyTex = new THREE.CanvasTexture(skyCanvas);
  scene.background = skyTex;

  // Fog matching lower sky
  scene.fog = new THREE.Fog( 0xd4726a, 400, 1200 );

  // Init GPGPU
  initComputeRenderer();

  // Init bird mesh
  initBirds();

  // Events
  document.addEventListener( 'pointermove', onPointerMove );
  window.addEventListener( 'resize', onWindowResize );

  // Go
  animate();
}

function initComputeRenderer() {
  gpuCompute = new GPUComputationRenderer( WIDTH, WIDTH, renderer );

  const dtPosition = gpuCompute.createTexture();
  const dtVelocity = gpuCompute.createTexture();
  fillPositionTexture( dtPosition );
  fillVelocityTexture( dtVelocity );

  velocityVariable = gpuCompute.addVariable( 'textureVelocity',
    document.getElementById('fragmentShaderVelocity').textContent, dtVelocity );
  positionVariable = gpuCompute.addVariable( 'texturePosition',
    document.getElementById('fragmentShaderPosition').textContent, dtPosition );

  gpuCompute.setVariableDependencies( velocityVariable, [ positionVariable, velocityVariable ] );
  gpuCompute.setVariableDependencies( positionVariable, [ positionVariable, velocityVariable ] );

  positionUniforms = positionVariable.material.uniforms;
  velocityUniforms = velocityVariable.material.uniforms;

  positionUniforms['time'] = { value: 0.0 };
  positionUniforms['delta'] = { value: 0.0 };
  velocityUniforms['time'] = { value: 1.0 };
  velocityUniforms['delta'] = { value: 0.0 };
  velocityUniforms['testing'] = { value: 1.0 };
  velocityUniforms['separationDistance'] = { value: 20.0 };
  velocityUniforms['alignmentDistance'] = { value: 20.0 };
  velocityUniforms['cohesionDistance'] = { value: 20.0 };
  velocityUniforms['freedomFactor'] = { value: 0.75 };
  velocityUniforms['predator'] = { value: new THREE.Vector3() };
  velocityVariable.material.defines.BOUNDS = BOUNDS.toFixed(2);

  velocityVariable.wrapS = THREE.RepeatWrapping;
  velocityVariable.wrapT = THREE.RepeatWrapping;
  positionVariable.wrapS = THREE.RepeatWrapping;
  positionVariable.wrapT = THREE.RepeatWrapping;

  const error = gpuCompute.init();
  if ( error !== null ) console.error( error );
}

function initBirds() {
  const trianglesPerBird = 3;
  const triangles = trianglesPerBird * BIRDS;
  const points = triangles * 3;

  const geometry = new THREE.BufferGeometry();
  const vertices = new THREE.BufferAttribute( new Float32Array( points * 3 ), 3 );
  const birdColors = new THREE.BufferAttribute( new Float32Array( points * 3 ), 3 );
  const references = new THREE.BufferAttribute( new Float32Array( points * 2 ), 2 );
  const birdVertex = new THREE.BufferAttribute( new Float32Array( points ), 1 );

  geometry.setAttribute( 'position', vertices );
  geometry.setAttribute( 'birdColor', birdColors );
  geometry.setAttribute( 'reference', references );
  geometry.setAttribute( 'birdVertex', birdVertex );

  let v = 0;
  function verts_push() {
    for ( let i = 0; i < arguments.length; i++ ) {
      vertices.array[ v++ ] = arguments[i];
    }
  }

  const wingsSpan = 20;
  for ( let f = 0; f < BIRDS; f++ ) {
    // Body
    verts_push( 0, -0, -20, 0, 4, -20, 0, 0, 30 );
    // Left wing
    verts_push( 0, 0, -15, -wingsSpan, 0, 0, 0, 0, 15 );
    // Right wing
    verts_push( 0, 0, 15, wingsSpan, 0, 0, 0, 0, -15 );
  }

  for ( let v = 0; v < triangles * 3; v++ ) {
    const triangleIndex = ~~( v / 3 );
    const birdIndex = ~~( triangleIndex / trianglesPerBird );
    const x = ( birdIndex % WIDTH ) / WIDTH;
    const y = ~~( birdIndex / WIDTH ) / WIDTH;

    // Dark bird silhouettes with subtle warm tint
    const shade = 0.08 + (birdIndex / BIRDS) * 0.12;
    birdColors.array[ v * 3 + 0 ] = shade;
    birdColors.array[ v * 3 + 1 ] = shade * 0.8;
    birdColors.array[ v * 3 + 2 ] = shade * 0.6;

    references.array[ v * 2 ] = x;
    references.array[ v * 2 + 1 ] = y;
    birdVertex.array[ v ] = v % 9;
  }

  geometry.scale( 0.2, 0.2, 0.2 );

  birdUniforms = {
    'color': { value: new THREE.Color( 0x222222 ) },
    'texturePosition': { value: null },
    'textureVelocity': { value: null },
    'time': { value: 1.0 },
    'delta': { value: 0.0 }
  };

  const material = new THREE.ShaderMaterial({
    uniforms: birdUniforms,
    vertexShader: document.getElementById('birdVS').textContent,
    fragmentShader: document.getElementById('birdFS').textContent,
    side: THREE.DoubleSide
  });

  const birdMesh = new THREE.Mesh( geometry, material );
  birdMesh.rotation.y = Math.PI / 2;
  birdMesh.matrixAutoUpdate = false;
  birdMesh.updateMatrix();

  scene.add( birdMesh );
}

function fillPositionTexture( texture ) {
  const theArray = texture.image.data;
  for ( let k = 0; k < theArray.length; k += 4 ) {
    theArray[k]   = Math.random() * BOUNDS - BOUNDS_HALF;
    theArray[k+1] = Math.random() * BOUNDS - BOUNDS_HALF;
    theArray[k+2] = Math.random() * BOUNDS - BOUNDS_HALF;
    theArray[k+3] = 1;
  }
}

function fillVelocityTexture( texture ) {
  const theArray = texture.image.data;
  for ( let k = 0; k < theArray.length; k += 4 ) {
    theArray[k]   = (Math.random() - 0.5) * 10;
    theArray[k+1] = (Math.random() - 0.5) * 10;
    theArray[k+2] = (Math.random() - 0.5) * 10;
    theArray[k+3] = 1;
  }
}

function onWindowResize() {
  windowHalfX = window.innerWidth / 2;
  windowHalfY = window.innerHeight / 2;
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize( window.innerWidth, window.innerHeight );
}

function onPointerMove( event ) {
  mouseX = event.clientX - windowHalfX;
  mouseY = event.clientY - windowHalfY;
}

function animate() {
  requestAnimationFrame( animate );
  render();
}

function render() {
  const now = performance.now();
  let delta = ( now - last ) / 1000;
  if ( delta > 1 ) delta = 1;
  last = now;

  positionUniforms['time'].value = now;
  positionUniforms['delta'].value = delta;
  velocityUniforms['time'].value = now;
  velocityUniforms['delta'].value = delta;
  birdUniforms['time'].value = now;
  birdUniforms['delta'].value = delta;

  velocityUniforms['predator'].value.set(
    0.5 * mouseX / windowHalfX,
    -0.5 * mouseY / windowHalfY,
    0
  );

  mouseX = 10000;
  mouseY = 10000;

  gpuCompute.compute();

  birdUniforms['texturePosition'].value = gpuCompute.getCurrentRenderTarget( positionVariable ).texture;
  birdUniforms['textureVelocity'].value = gpuCompute.getCurrentRenderTarget( velocityVariable ).texture;

  renderer.render( scene, camera );
}
</script>
</body>
</html>
