<script type="importmap">{"imports":{

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
import * as SkeletonUtils from 'three/addons/utils/SkeletonUtils.js';

/* ═══════════════════════════════════════════════════════════════════
   SABDA Watchout 4-Wall Output — Evening Road v11
   
   Matches Unity Spout layout exactly:
   ┌─────────────────────┬────────────┐
   │  Left (5008×1200)   │Front(1920) │  ← top row
   ├─────────────────────┼────────────┤
   │  Right (5008×1200)  │Back (1920) │  ← bottom row
   └─────────────────────┴────────────┘
   Total canvas: 6928 × 2400
   
   OBS crops 4 regions → 4 Spout senders:
     SpoutFront = top-right   (x:5008, y:0,    w:1920, h:1200)
     SpoutBack  = bot-right   (x:5008, y:1200, w:1920, h:1200)
     SpoutLeft  = top-left    (x:0,    y:0,    w:5008, h:1200)
     SpoutRight = bot-left    (x:0,    y:1200, w:5008, h:1200)
   
   Zero Watchout config change needed — same 4 Spout source names.
   ═══════════════════════════════════════════════════════════════════ */

// ── WALL DIMENSIONS (from Unity Spout) ──
const W_LEFT   = 5008, H_WALL = 1200;
const W_RIGHT  = 5008;
const W_FRONT  = 1920;
const W_BACK   = 1920;
const OUT_W = W_LEFT + W_FRONT;   // 6928
const OUT_H = H_WALL * 2;  // 2400

// ── SABDA ROOM GEOMETRY (for azimuth mapping) ──
const ROOM_L = 15.00;   // long walls (Left/Right)
const ROOM_W = 5.63;    // short walls (Front/Back)
const PERIM = 2 * ROOM_L + 2 * ROOM_W;  // 41.26m

// Wall order in the 360° panorama (azimuth 0 = centre of Front wall C):
// Front C: 0 to ROOM_W/PERIM
// Right D: ROOM_W/PERIM to (ROOM_W+ROOM_L)/PERIM
// Back A:  (ROOM_W+ROOM_L)/PERIM to (2*ROOM_W+ROOM_L)/PERIM
// Left B:  (2*ROOM_W+ROOM_L)/PERIM to 1.0
const uF = ROOM_W / PERIM;                    // 0.1364
const uR = (ROOM_W + ROOM_L) / PERIM;         // 0.5000
const uB = (2 * ROOM_W + ROOM_L) / PERIM;     // 0.6364
// Left goes from uB to 1.0

const BREATH = 14, CCYCLE = 90;
const EYE_H = 1.6;

// ═══════════════════════════════════════════════════════
// RENDERER
// ═══════════════════════════════════════════════════════
const renderer = new THREE.WebGLRenderer({
  antialias: false,
  powerPreference: 'high-performance',
});
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.setPixelRatio(1);
renderer.setSize(OUT_W, OUT_H);
document.body.appendChild(renderer.domElement);

// ═══════════════════════════════════════════════════════
// CONTENT SCENE
// ═══════════════════════════════════════════════════════
const contentScene = new THREE.Scene();

const CUBE_SIZE = 4096;
const cubeRT = new THREE.WebGLCubeRenderTarget(CUBE_SIZE, {
  generateMipmaps: true,
  minFilter: THREE.LinearMipmapLinearFilter,
  type: THREE.HalfFloatType,
});
const cubeCamera = new THREE.CubeCamera(0.05, 500, cubeRT);
cubeCamera.position.set(0, EYE_H, 0);
contentScene.add(cubeCamera);

// ═══════════════════════════════════════════════════════
// 4 EQUIRECT WALL RENDER TARGETS
// Each wall gets its own RT at exact Unity resolution
// ═══════════════════════════════════════════════════════
const VFOV_RAD = 62.5 * Math.PI / 180.0;
const ELEV_OFFSET = 3.0 * Math.PI / 180.0;

function makeWallRT(w, h) {
  return new THREE.WebGLRenderTarget(w, h, {
    minFilter: THREE.LinearFilter, magFilter: THREE.LinearFilter,
    colorSpace: THREE.SRGBColorSpace,
  });
}

const rtFront = makeWallRT(W_FRONT, H_WALL);
const rtBack  = makeWallRT(W_BACK, H_WALL);
const rtLeft  = makeWallRT(W_LEFT, H_WALL);
const rtRight = makeWallRT(W_RIGHT, H_WALL);

// Equirect shader — renders a specific azimuth range from the cubemap
function makeEquirectMat(azStartFrac, azEndFrac) {
  const azStart = azStartFrac * Math.PI * 2;
  const azEnd   = azEndFrac * Math.PI * 2;
  return new THREE.ShaderMaterial({
    uniforms: {
      tCube: { value: null },
      vFovRad: { value: VFOV_RAD },
      elevOffset: { value: ELEV_OFFSET },
      azStart: { value: azStart },
      azRange: { value: azEnd - azStart },
    },
    vertexShader: `
      varying vec2 vUv;
      void main() { vUv = uv; gl_Position = vec4(position.xy, 0.0, 1.0); }
    `,
    fragmentShader: `
      precision highp float;
      uniform samplerCube tCube;
      uniform float vFovRad, elevOffset, azStart, azRange;
      varying vec2 vUv;
      float dither(vec2 co) {
        return fract(sin(dot(co, vec2(12.9898, 78.233))) * 43758.5453) - 0.5;
      }
      void main() {
        float azimuth = azStart + vUv.x * azRange;
        float elevation = (vUv.y - 0.5) * vFovRad + elevOffset;
        float ce = cos(elevation);
        vec3 dir = vec3(sin(azimuth) * ce, sin(elevation), -cos(azimuth) * ce);
        vec4 col = textureCube(tCube, dir);

        // ── PROJECTION OPTIMIZATION (gentle) ──

        // 1. Black floor lift — subtle, prevents dark patches in overlap zones
        col.rgb = col.rgb * 0.97 + 0.015;

        // 2. Moderate contrast — 50% S-curve (reduced from 80% — room needs brightness)
        vec3 scurve = col.rgb * col.rgb * (3.0 - 2.0 * col.rgb);
        col.rgb = mix(col.rgb, scurve, 0.50);

        // 3. Saturation boost — 45% (vivid without oversaturating)
        float luma = dot(col.rgb, vec3(0.299, 0.587, 0.114));
        col.rgb = mix(vec3(luma), col.rgb, 1.45);

        // 4. Soft highlight ceiling — no hard clip, just gentle compression above 0.85
        col.rgb = min(col.rgb, 0.85 + (col.rgb - 0.85) * 0.3);

        // 4. Gentle vignette on vertical edges — helps blend zones
        float topBottomFade = smoothstep(0.0, 0.02, vUv.y) * smoothstep(1.0, 0.98, vUv.y);
        col.rgb *= topBottomFade * 0.05 + 0.95;

        // Film grain: 1.5/255 dithering — breaks up banding in dark purple gradients
        col.rgb += dither(gl_FragCoord.xy) * 1.5 / 255.0;
        gl_FragColor = col;
      }
    `,
    depthWrite: false, depthTest: false,
  });
}

// Each wall's azimuth range (fraction of 360°)
const matFront = makeEquirectMat(0.0, uF);
const matRight = makeEquirectMat(uF, uR);
const matBack  = makeEquirectMat(uR, uB);
const matLeft  = makeEquirectMat(uB, 1.0);

// Fullscreen quads for each wall render
function makeEquirectScene(mat) {
  const s = new THREE.Scene();
  s.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), mat));
  return s;
}
const eqScnFront = makeEquirectScene(matFront);
const eqScnRight = makeEquirectScene(matRight);
const eqScnBack  = makeEquirectScene(matBack);
const eqScnLeft  = makeEquirectScene(matLeft);
const eqCam = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

// ═══════════════════════════════════════════════════════
// COMPOSITE SCENE — blit 4 wall textures onto final canvas
// Layout: Left+Front on top, Right+Back on bottom
// ═══════════════════════════════════════════════════════
const compScene = new THREE.Scene();
const compCam = new THREE.OrthographicCamera(0, OUT_W, OUT_H, 0, -1, 1);

function makeQuad(rt, x, y, w, h) {
  const mat = new THREE.MeshBasicMaterial({ map: rt.texture });
  const mesh = new THREE.Mesh(new THREE.PlaneGeometry(w, h), mat);
  mesh.position.set(x + w/2, y + h/2, 0);
  return mesh;
}

// Top row: Left (0,1200) then Front (5008,1200)
compScene.add(makeQuad(rtLeft,  0,       H_WALL, W_LEFT,  H_WALL));
compScene.add(makeQuad(rtFront, W_LEFT,  H_WALL, W_FRONT, H_WALL));
// Bottom row: Right (0,0) then Back (5008,0)
compScene.add(makeQuad(rtRight, 0,       0,      W_RIGHT, H_WALL));
compScene.add(makeQuad(rtBack,  W_RIGHT, 0,      W_BACK,  H_WALL));

// ── PROJECTOR SIMULATION SCENES ──
// Press P to cycle: 0=both strips, 1=top only (Left+Front), 2=bottom only (Right+Back)
let projMode = 0;
const STRIP_W = W_LEFT + W_FRONT; // 6928
const STRIP_H = H_WALL;           // 1200

const projTopScene = new THREE.Scene();
const projTopCam = new THREE.OrthographicCamera(0, STRIP_W, STRIP_H, 0, -1, 1);
projTopScene.add(makeQuad(rtLeft,  0,      0, W_LEFT,  H_WALL));
projTopScene.add(makeQuad(rtFront, W_LEFT, 0, W_FRONT, H_WALL));

const projBotScene = new THREE.Scene();
const projBotCam = new THREE.OrthographicCamera(0, STRIP_W, STRIP_H, 0, -1, 1);
projBotScene.add(makeQuad(rtRight, 0,       0, W_RIGHT, H_WALL));
projBotScene.add(makeQuad(rtBack,  W_RIGHT, 0, W_BACK,  H_WALL));

// ── GUIDE OVERLAYS (toggle with D key) ──
const guideGroup = new THREE.Group();

// Horizontal divider
const divGeo = new THREE.PlaneGeometry(OUT_W, 3);
const divMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
const divLine = new THREE.Mesh(divGeo, divMat);
divLine.position.set(OUT_W/2, H_WALL/2, 0.1);
guideGroup.add(divLine);

// Vertical divider
const vdivGeo = new THREE.PlaneGeometry(3, OUT_H);
const vdivLine = new THREE.Mesh(vdivGeo, divMat);
vdivLine.position.set(W_LEFT, OUT_H/2, 0.1);
guideGroup.add(vdivLine);

// Labels
function makeLabel(text, x, y) {
  const cvs = document.createElement('canvas');
  cvs.width = 512; cvs.height = 48;
  const ctx = cvs.getContext('2d');
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, 512, 48);
  ctx.font = 'bold 28px monospace';
  ctx.fillStyle = '#ff3333';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, 256, 24);
  const tex = new THREE.CanvasTexture(cvs);
  const mat = new THREE.MeshBasicMaterial({ map: tex, transparent: true });
  const mesh = new THREE.Mesh(new THREE.PlaneGeometry(280, 30), mat);
  mesh.position.set(x, y, 0.2);
  return mesh;
}
guideGroup.add(makeLabel('LEFT (5008×1200)',  W_LEFT/2,  OUT_H - 25));
guideGroup.add(makeLabel('FRONT (1920×1200)', W_LEFT + W_FRONT/2, OUT_H - 25));
guideGroup.add(makeLabel('RIGHT (5008×1200)', W_RIGHT/2, H_WALL - 25));
guideGroup.add(makeLabel('BACK (1920×1200)',  W_RIGHT + W_BACK/2, H_WALL - 25));

// guideGroup removed for render;

let showGuides = true;
document.addEventListener('keydown', e => {
  if (e.key === 'd' || e.key === 'D') {
    showGuides = !showGuides;
    guideGroup.visible = showGuides;
  }
  if (e.key === 'p' || e.key === 'P') {
    projMode = (projMode + 1) % 3;
    const labels = ['BOTH STRIPS', 'TOP STRIP (Left+Front)', 'BOTTOM STRIP (Right+Back)'];
    console.log('Projector sim:', labels[projMode]);
    // Show mode label briefly
    const lbl = document.getElementById('projLabel');
    if(lbl){ lbl.textContent = labels[projMode]; lbl.style.opacity = 1;
      clearTimeout(lbl._t); lbl._t = setTimeout(()=>{ lbl.style.opacity = 0; }, 2000); }
  }
});

// ═══════════════════════════════════════════════════════
// CONTENT SCENE ELEMENTS (identical to v11)
// ═══════════════════════════════════════════════════════

// ── SKY ──
const tl = new THREE.TextureLoader();
function b64T(id, m) {
  const t = tl.load('data:' + m + ';base64,' + document.getElementById(id).textContent.trim());
  t.colorSpace = THREE.SRGBColorSpace; return t;
}
const skyTexA = b64T('skydata', 'image/png');
skyTexA.mapping = THREE.EquirectangularReflectionMapping;
skyTexA.anisotropy = renderer.capabilities.getMaxAnisotropy();
skyTexA.minFilter = THREE.LinearMipmapLinearFilter;
skyTexA.magFilter = THREE.LinearFilter;
skyTexA.generateMipmaps = true;

const skyTexB = b64T('skydata_b', 'image/png');
skyTexB.mapping = THREE.EquirectangularReflectionMapping;
skyTexB.anisotropy = renderer.capabilities.getMaxAnisotropy();
skyTexB.minFilter = THREE.LinearMipmapLinearFilter;
skyTexB.magFilter = THREE.LinearFilter;
skyTexB.generateMipmaps = true;

const skySphereGeo = new THREE.SphereGeometry(400, 64, 32);
const skySphereMat = new THREE.ShaderMaterial({
  uniforms: {
    texA: { value: skyTexA },
    texB: { value: skyTexB },
    mixVal: { value: 0.0 },
    tintColor: { value: new THREE.Color(1,1,1) }
  },
  vertexShader: `
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    precision highp float;
    uniform sampler2D texA, texB;
    uniform float mixVal;
    uniform vec3 tintColor;
    varying vec2 vUv;
    float dither(vec2 co) {
      return fract(sin(dot(co, vec2(12.9898, 78.233))) * 43758.5453) - 0.5;
    }
    void main() {
      vec4 a = texture2D(texA, vUv);
      vec4 b = texture2D(texB, vUv);
      vec3 col = mix(a.rgb, b.rgb, mixVal) * tintColor;
      // Fantasy vibrancy — boost saturation hard
      float luma = dot(col, vec3(0.299, 0.587, 0.114));
      col = mix(vec3(luma), col, 1.8); // 1.8x saturation
      // Contrast S-curve — punchy highlights and shadows
      col = (col - 0.5) * 1.3 + 0.5;
      // Cloud brightness lift
      float skyLuma = dot(col, vec3(0.299, 0.587, 0.114));
      float liftAmount = smoothstep(0.0, 0.65, skyLuma) * (1.0 - smoothstep(0.65, 0.98, skyLuma));
      col += liftAmount * 0.35;
      // Vivid warm/cool tint on dark areas
      float darkCloud = (1.0 - smoothstep(0.0, 0.55, skyLuma)) * 0.20;
      col.r += darkCloud * 1.2;
      col.g += darkCloud * 0.3;
      col.b += darkCloud * 0.9;
      col = max(col, vec3(0.08));
      col = clamp(col, 0.0, 1.0);
      col += dither(gl_FragCoord.xy) / 255.0;
      gl_FragColor = vec4(col, 1.0);
    }
  `,
  side: THREE.BackSide
});
const skySphere = new THREE.Mesh(skySphereGeo, skySphereMat);
contentScene.add(skySphere);
contentScene.background = null;
contentScene.environment = skyTexA;

// ── LIGHTING ──
const ambient = new THREE.AmbientLight(0x8a4560, 0.5); contentScene.add(ambient);
const hemi = new THREE.HemisphereLight(0xff6830, 0x2030a0, 0.55); contentScene.add(hemi);
const sun = new THREE.DirectionalLight(0xff7040, 1.0); sun.position.set(10, 15, -8); contentScene.add(sun);
const rim = new THREE.DirectionalLight(0x5060ff, 0.45); rim.position.set(-10, 8, 8); contentScene.add(rim);
const fill = new THREE.DirectionalLight(0xff5020, 0.3); fill.position.set(0, 5, 15); contentScene.add(fill);

// ── FOG ──
contentScene.fog = new THREE.FogExp2(0xaa5590, 0.003);

// ── LOWER CLOUD BANK ──
// Fills the weak lower panorama with drifting volumetric-look clouds
const CLOUD_LAYERS = 3;
const cloudMeshes = [];
for (let li = 0; li < CLOUD_LAYERS; li++) {
  const cloudGeo = new THREE.PlaneGeometry(900, 900, 1, 1);
  const cloudMat = new THREE.ShaderMaterial({
    transparent: true, depthWrite: false, side: THREE.DoubleSide, fog: false,
    uniforms: {
      uTime: { value: 0 },
      uLayer: { value: li },
      uOpacity: { value: [0.35, 0.25, 0.18][li] },
      uSkyColor: { value: new THREE.Color(0.72, 0.52, 0.58) },
    },
    vertexShader: `
      varying vec2 vUv;
      varying float vDist;
      void main() {
        vUv = uv;
        vec4 wp = modelMatrix * vec4(position, 1.0);
        vDist = length(wp.xz);
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      precision highp float;
      uniform float uTime, uLayer, uOpacity;
      uniform vec3 uSkyColor;
      varying vec2 vUv;
      varying float vDist;

      // Simplex-style noise
      vec3 mod289(vec3 x) { return x - floor(x * (1.0/289.0)) * 289.0; }
      vec2 mod289(vec2 x) { return x - floor(x * (1.0/289.0)) * 289.0; }
      vec3 permute(vec3 x) { return mod289(((x*34.0)+1.0)*x); }
      float snoise(vec2 v) {
        const vec4 C = vec4(0.211324865405187, 0.366025403784439, -0.577350269189626, 0.024390243902439);
        vec2 i = floor(v + dot(v, C.yy));
        vec2 x0 = v - i + dot(i, C.xx);
        vec2 i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);
        vec4 x12 = x0.xyxy + C.xxzz;
        x12.xy -= i1;
        i = mod289(i);
        vec3 p = permute(permute(i.y + vec3(0.0, i1.y, 1.0)) + i.x + vec3(0.0, i1.x, 1.0));
        vec3 m = max(0.5 - vec3(dot(x0,x0), dot(x12.xy,x12.xy), dot(x12.zw,x12.zw)), 0.0);
        m = m*m; m = m*m;
        vec3 x = 2.0 * fract(p * C.www) - 1.0;
        vec3 h = abs(x) - 0.5;
        vec3 ox = floor(x + 0.5);
        vec3 a0 = x - ox;
        m *= 1.79284291400159 - 0.85373472095314 * (a0*a0 + h*h);
        vec3 g;
        g.x = a0.x * x0.x + h.x * x0.y;
        g.yz = a0.yz * x12.xz + h.yz * x12.yw;
        return 130.0 * dot(m, g);
      }

      float fbm(vec2 p) {
        float f = 0.0;
        f += 0.5000 * snoise(p); p *= 2.01;
        f += 0.2500 * snoise(p); p *= 2.02;
        f += 0.1250 * snoise(p); p *= 2.03;
        f += 0.0625 * snoise(p);
        return f;
      }

      void main() {
        vec2 uv = vUv - 0.5; // center
        float r = length(uv) * 2.0; // 0 at center, 1 at edge

        // Circular fade — soft at edges, invisible at far distance
        float edgeFade = 1.0 - smoothstep(0.6, 1.0, r);

        // Distance fade from camera (inner hole so no clouds directly underfoot)
        float innerFade = smoothstep(20.0, 80.0, vDist);
        float outerFade = 1.0 - smoothstep(300.0, 420.0, vDist);

        // Animated cloud noise
        float speed = 0.008 + uLayer * 0.003;
        float scale = 0.008 - uLayer * 0.001;
        vec2 cloudUv = uv * 450.0 * scale + vec2(uTime * speed, uTime * speed * 0.7);
        float n = fbm(cloudUv);
        float n2 = fbm(cloudUv * 1.8 + vec2(3.7, 1.2));

        // Cloud shape — billowy with clear patches
        float cloud = smoothstep(-0.1, 0.45, n) * smoothstep(-0.2, 0.5, n2);
        cloud = pow(cloud, 0.8);

        // Color: warm sky-matched tones with subtle variation
        vec3 col = uSkyColor;
        col += vec3(0.08, 0.04, 0.06) * n; // subtle warm variation
        col += vec3(0.05, 0.02, 0.08) * (1.0 - cloud) * 0.5; // purple in gaps

        // Brightness lift for luminous cloud feel
        col += vec3(0.12, 0.08, 0.10) * cloud;

        float alpha = cloud * edgeFade * innerFade * outerFade * uOpacity;
        gl_FragColor = vec4(col, alpha);
      }
    `,
  });
  const cloudPlane = new THREE.Mesh(cloudGeo, cloudMat);
  cloudPlane.rotation.x = -Math.PI / 2;
  // Stack layers at different heights below horizon
  cloudPlane.position.y = -3.0 - li * 2.5;
  cloudPlane.renderOrder = -10 + li;
  contentScene.add(cloudPlane);
  cloudMeshes.push(cloudPlane);
}

// ── STAR FIELD ──
const STAR_COUNT = 400;
const starGeo = new THREE.BufferGeometry();
const starPos = new Float32Array(STAR_COUNT * 3);
const starSizes = new Float32Array(STAR_COUNT);
for (let i = 0; i < STAR_COUNT; i++) {
  const theta = Math.random() * Math.PI * 2;
  const elev = (15 + Math.random() * 70) * Math.PI / 180;
  const r = 350 + Math.random() * 40;
  starPos[i*3] = Math.cos(elev)*Math.cos(theta)*r;
  starPos[i*3+1] = Math.sin(elev)*r;
  starPos[i*3+2] = Math.cos(elev)*Math.sin(theta)*r;
  starSizes[i] = 1.0 + Math.random() * 2.5;
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
starGeo.setAttribute('size', new THREE.BufferAttribute(starSizes, 1));
const starMat = new THREE.ShaderMaterial({
  uniforms: { uTime: { value: 0 }, uOpacity: { value: 0 } },
  vertexShader: `
    attribute float size; varying float vTwinkle; uniform float uTime;
    void main() {
      vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
      vTwinkle = 0.5 + 0.5 * sin(uTime * (1.5 + position.x * 0.01) + position.y * 0.02);
      gl_PointSize = size * (6.0 / -mvPos.z);
      gl_Position = projectionMatrix * mvPos;
    }
  `,
  fragmentShader: `
    uniform float uOpacity; varying float vTwinkle;
    void main() {
      float d = length(gl_PointCoord - vec2(0.5));
      if (d > 0.5) discard;
      gl_FragColor = vec4(0.95, 0.92, 1.0, smoothstep(0.5, 0.0, d) * vTwinkle * uOpacity);

});

// ── SHOOTING STAR ──
const shootingStarState = {
  active: false, timer: 2,
  pos: new THREE.Vector3(), vel: new THREE.Vector3(), life: 0, maxLife: 0, tailBonus: 0,
};
// Shooting star = multi-segment triangle strip following dome curvature
const SS_SEGMENTS = 12;
const ssGeo = new THREE.BufferGeometry();
const ssVerts = new Float32Array((SS_SEGMENTS + 1) * 2 * 3); // 2 verts per segment cross-section
const ssUvs = new Float32Array((SS_SEGMENTS + 1) * 2 * 2);
const ssIndices = [];
for (let i = 0; i <= SS_SEGMENTS; i++) {
  const t = i / SS_SEGMENTS;  // 0=tail, 1=head
  ssUvs[i*4]   = 0; ssUvs[i*4+1] = t;
  ssUvs[i*4+2] = 1; ssUvs[i*4+3] = t;
  if (i < SS_SEGMENTS) {
    const b = i * 2;
    ssIndices.push(b, b+1, b+2, b+1, b+3, b+2);
  }
}
ssGeo.setAttribute('position', new THREE.BufferAttribute(ssVerts, 3));
ssGeo.setAttribute('uv', new THREE.BufferAttribute(ssUvs, 2));
ssGeo.setIndex(ssIndices);
const ssMat = new THREE.ShaderMaterial({
  transparent: true, depthWrite: false, side: THREE.DoubleSide, fog: false,
  uniforms: {
    uOpacity: { value: 1.0 },
    uColor: { value: new THREE.Color(1, 0.98, 0.9) },
  },
  vertexShader: `
    varying vec2 vUv;
    void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }
  `,
  fragmentShader: `
    precision highp float;
    uniform float uOpacity;
    uniform vec3 uColor;
    varying vec2 vUv;
    void main() {
      float headGlow = pow(vUv.y, 2.5);
      float cx = abs(vUv.x - 0.5) * 2.0;
      float core = pow(max(0.0, 1.0 - cx), 6.0);
      float glow = pow(max(0.0, 1.0 - cx), 1.8) * 0.25;
      float centerLine = core + glow;
      float headBoost = smoothstep(0.88, 1.0, vUv.y) * 0.7;
      float alpha = headGlow * centerLine * uOpacity + headBoost * uOpacity * core;
      gl_FragColor = vec4(uColor, clamp(alpha, 0.0, 1.0));
    }
  `,
});
const ssStreak = new THREE.Mesh(ssGeo, ssMat);
ssStreak.visible = false; ssStreak.frustumCulled = false;
contentScene.add(ssStreak);

const dustSpeeds = new Float32Array(DUST_COUNT * 3);
const dustPhases = new Float32Array(DUST_COUNT);
for (let i = 0; i < DUST_COUNT; i++) {
  const theta = Math.random()*Math.PI*2, phi = Math.acos(2*Math.random()-1), r = 3+Math.random()*27;
  dustPositions[i*3] = Math.sin(phi)*Math.cos(theta)*r;
  dustPositions[i*3+1] = Math.sin(phi)*Math.sin(theta)*r;
  dustPositions[i*3+2] = Math.cos(phi)*r;
  dustSizes[i] = (1.0-(r-3)/27)*1.7+0.8;
  dustSpeeds[i*3] = (Math.random()-0.5)*0.003;
  dustSpeeds[i*3+1] = 0.001+Math.random()*0.003;
  dustSpeeds[i*3+2] = (Math.random()-0.5)*0.003;
  dustPhases[i] = Math.random()*Math.PI*2;
}
dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPositions, 3));
dustGeo.setAttribute('size', new THREE.BufferAttribute(dustSizes, 1));
const dustMat = new THREE.ShaderMaterial({
  uniforms: { uTime:{value:0}, uColor:{value:new THREE.Color(0xffe0a0)}, uOpacity:{value:0.35} },
  vertexShader: `
    attribute float size; uniform float uTime; varying float vAlpha;
    void main() {
      vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
      float dist = length(mvPos.xyz);
      vAlpha = smoothstep(2.0,5.0,dist)*(1.0-smoothstep(25.0,35.0,dist))*(0.7+0.3*sin(uTime*1.5+position.x*3.0+position.y*2.0));
      gl_PointSize = size*(8.0/-mvPos.z);
      gl_Position = projectionMatrix * mvPos;
    }
  `,
  fragmentShader: `
    uniform vec3 uColor; uniform float uOpacity; varying float vAlpha;
    void main() {
      float d = length(gl_PointCoord-vec2(0.5));
      if(d>0.5) discard;
      gl_FragColor = vec4(uColor, (1.0-d*2.0)*vAlpha*uOpacity);
    }
  `,
  transparent: true, depthWrite: false, blending: THREE.AdditiveBlending,
});

// ── BALLOON HOUSE (3D house + 3D balloon cluster GLB — 1-minute crossing) ──
// Rises from below the horizon, crosses the sky, exits above.
// Balloons appear first, then strings, then house — pure geometric emergence.
// Three copies of balloon GLB, each with one of the 3 brand colors, rotated 120° apart.
const BH_ANGLE = Math.PI;            // center of left wall
const BH_DIST = 65;                  // closer for real perspective depth
const BH_HOUSE_SCALE = 0.315;        // 10% smaller house
const BH_EVENT_START = 600;           // starts at t=10min
const BH_EVENT_DUR = 60;             // 60 seconds to cross
const BH_Y_START = -100;             // far below — invisible even through CubeCamera
const BH_Y_END = 80;                 // above projection at end
const BH_SPEED = (BH_Y_END - BH_Y_START) / BH_EVENT_DUR;

const BH_X0 = Math.cos(BH_ANGLE) * BH_DIST;
const BH_Z0 = Math.sin(BH_ANGLE) * BH_DIST;

// Colors: deep blue, salmon pink, mint green
// 8-color palette
// 8-color palette
const BH_WARM = [0xFF0000, 0xFFD700, 0xFF8C00, 0xFF69B4];
const BH_COOL = [0x0000FF, 0x00FF00, 0x9400D3, 0x00FFFF];
const BH_COLORS = [...BH_WARM, ...BH_COOL];

const balloonGroup = new THREE.Group();
balloonGroup.position.set(BH_X0, BH_Y_START, BH_Z0);
contentScene.add(balloonGroup);

const BH_CHIMNEY_Y = 9.5 * BH_HOUSE_SCALE;
const BH_GAP = 1.06; // strings — ratio 48/385 of cluster height
// From reference: balloon:house width = 2.04x, balloon H:W = 1.51:1
const BH_CLUSTER_H = 8.47 * 1.05; // 5% taller
const BH_MAX_R = 2.81 * 0.855;    // 5% + 10% narrower
const BH_CLUSTER_BOT = BH_CHIMNEY_Y + BH_GAP;
const BH_CLUSTER_TOP = BH_CLUSTER_BOT + BH_CLUSTER_H;
const BH_N_INTERIOR = 400;
const BH_EACH_SCALE = 0.024;

// Exact profile from reference image analysis
// Bottom 65%: smooth taper (power 0.75 = slightly convex)
// Top 35%: rounded dome (sqrt(1 - t^1.5) = stays wide then rounds off)
// Widest at 65% up
function bhClusterR(y01) {
  if (y01 < 0 || y01 > 1) return 0;
  if (y01 < 0.65) {
    const t = y01 / 0.65;
    return BH_MAX_R * Math.pow(t, 0.75);
  }
  const t = (y01 - 0.65) / 0.35;
  return BH_MAX_R * Math.sqrt(Math.max(0, 1 - Math.pow(t, 1.5)));
}

// Specular highlight light
const bhGlintLight = new THREE.PointLight(0xFCF5E5, 3.5, 35);
bhGlintLight.position.set(-3, BH_CLUSTER_BOT + BH_CLUSTER_H * 0.75, 3);
balloonGroup.add(bhGlintLight);

let _bseed = 42;
function brand() { _bseed = (_bseed * 16807) % 2147483647; return _bseed / 2147483647; }

const bhPositions = [];

// Interior volume fill
for (let i = 0; i < BH_N_INTERIOR; i++) {
  for (let tries = 0; tries < 100; tries++) {
    const y01 = brand();
    const maxR = bhClusterR(y01);
    if (maxR < 0.1) continue;
    const angle = brand() * Math.PI * 2;
    const r = Math.sqrt(brand()) * maxR;
    bhPositions.push({
      x: Math.cos(angle) * r, y: BH_CLUSTER_BOT + y01 * BH_CLUSTER_H,
      z: Math.sin(angle) * r, rotY: brand() * Math.PI * 2,
      scale: BH_EACH_SCALE * (0.85 + brand() * 0.3), colorIdx: -1,
    });
    break;
  }
}

// Shell surface — systematic rings
let shellCount = 0;
const SHELL_LAYERS = 50;
for (let li = 0; li < SHELL_LAYERS; li++) {
  const y01 = (li + 0.5) / SHELL_LAYERS;
  const maxR = bhClusterR(y01);
  if (maxR < 0.15) continue;
  const circ = Math.PI * 2 * maxR;
  const nRing = Math.max(3, Math.round(circ / 1.0));
  for (let ri = 0; ri < nRing; ri++) {
    const angle = (ri / nRing) * Math.PI * 2 + (li % 2) * (Math.PI / nRing);
    const r = maxR * (0.92 + brand() * 0.10);
    bhPositions.push({
      x: Math.cos(angle) * r, y: BH_CLUSTER_BOT + y01 * BH_CLUSTER_H,
      z: Math.sin(angle) * r, rotY: brand() * Math.PI * 2,
      scale: BH_EACH_SCALE * (0.90 + brand() * 0.2), colorIdx: -1,
    });
    shellCount++;
  }
}

// Assign colors: warm top-right ↔ cool bottom-left gradient + neighbor avoidance
for (let i = 0; i < bhPositions.length; i++) {
  const p = bhPositions[i];
  // Gradient: combine normalized Y (0=bottom, 1=top) and X direction
  const ny = (p.y - BH_CLUSTER_BOT) / BH_CLUSTER_H; // 0..1
  const nx = p.x / (BH_MAX_R + 0.5); // -1..1 roughly
  const warmBias = (ny * 0.6 + nx * 0.4 + 1) / 2; // 0=cool, 1=warm
  
  // Collect neighbor colors
  const nearColors = new Set();
  for (let j = 0; j < i; j++) {
    const q = bhPositions[j];
    const dx = p.x-q.x, dy = p.y-q.y, dz = p.z-q.z;
    if (dx*dx+dy*dy+dz*dz < 2.2*2.2) nearColors.add(q.colorIdx);
  }
  
  // Pick from warm or cool pool based on gradient, with randomness
  let ci;
  for (let t = 0; t < 50; t++) {
    const useWarm = brand() < (warmBias * 0.7 + 0.15); // biased but not strict
    if (useWarm) {
      ci = Math.floor(brand() * BH_WARM.length); // warm indices 0-3
    } else {
      ci = BH_WARM.length + Math.floor(brand() * BH_COOL.length); // cool indices 4-7
    }
    if (!nearColors.has(ci)) break;
  }
  p.colorIdx = ci;
}

// ── LOAD BALLOON GLB → create many small copies in ellipsoid ──
const balloonGlbUrl = b64ToUrl('balloonglbdata', 'model/gltf-binary');
loader.load(balloonGlbUrl, gltf => {
  URL.revokeObjectURL(balloonGlbUrl);
  
  // Extract the geometry from the single mesh
  let balloonGeo = null;
  gltf.scene.traverse(c => {
    if (c.isMesh && !balloonGeo) balloonGeo = c.geometry;
  });
  
  if (!balloonGeo) {
    console.error('SABDA: No mesh found in balloon GLB');
    checkReady();
    return;
  }
  
  console.log('SABDA: Balloon geo verts:', balloonGeo.attributes.position.count);
  
  // 3 brightness tiers per color: full, -15%, -30% (ambient occlusion)
  const bhMats = [];
  for (let ci = 0; ci < BH_COLORS.length; ci++) {
    const base = new THREE.Color(BH_COLORS[ci]);
    for (let tier = 0; tier < 3; tier++) {
      const darken = 1.0 - tier * 0.15; // 1.0, 0.85, 0.70
      const col = base.clone().multiplyScalar(darken);
      bhMats.push(new THREE.MeshStandardMaterial({
        color: col,
        roughness: 0.35,
        metalness: 0.03,
        emissive: col.clone().multiplyScalar(0.06),
      }));
    }
  }
  
  // Place each copy with AO tier based on position
  for (let i = 0; i < bhPositions.length; i++) {
    const p = bhPositions[i];
    
    // AO: how deep inside the cluster? Center + bottom = darker
    const ny = (p.y - BH_CLUSTER_BOT) / BH_CLUSTER_H;
    const maxR = bhClusterR(ny);
    const dist = Math.sqrt(p.x*p.x + p.z*p.z);
    const depthFrac = maxR > 0.1 ? 1 - (dist / maxR) : 0; // 0=surface, 1=dead center
    const bottomFrac = 1 - ny; // 1=bottom, 0=top
    const ao = depthFrac * 0.6 + bottomFrac * 0.4; // combined AO
    
    // tier 0 = bright (surface/top), tier 2 = dark (center/bottom)
    let tier;
    if (ao < 0.3) tier = 0;
    else if (ao < 0.6) tier = 1;
    else tier = 2;
    
    const matIdx = p.colorIdx * 3 + tier;
    const mesh = new THREE.Mesh(balloonGeo, bhMats[matIdx]);
    mesh.position.set(p.x, p.y, p.z);
    mesh.rotation.y = p.rotY;
    mesh.scale.setScalar(p.scale);
    mesh.frustumCulled = false;
    balloonGroup.add(mesh);
  }
  
  console.log('SABDA: Balloon cluster —', bhPositions.length, 'copies, group children:', balloonGroup.children.length);
  checkReady();
}, undefined, err => {
  console.error('SABDA: Balloon GLB FAILED:', err);
  checkReady();
});

  for(let i=0;i<DUST_COUNT;i++){const i3=i*3;
    dPos[i3]+=dustSpeeds[i3]+Math.sin(time*0.3+dustPhases[i])*0.0005;
    dPos[i3+1]+=dustSpeeds[i3+1]+Math.sin(time*0.2+dustPhases[i]*1.7)*0.0003;
    dPos[i3+2]+=dustSpeeds[i3+2]+Math.cos(time*0.25+dustPhases[i]*0.8)*0.0005;
    const dx=dPos[i3],dy=dPos[i3+1],dz=dPos[i3+2];
    if(dx*dx+dy*dy+dz*dz>35*35||dy>20){const t2=Math.random()*Math.PI*2,p2=Math.acos(2*Math.random()-1),r2=3+Math.random()*10;
      dPos[i3]=Math.sin(p2)*Math.cos(t2)*r2;dPos[i3+1]=Math.sin(p2)*Math.sin(t2)*r2-2;dPos[i3+2]=Math.cos(p2)*r2;}
  }
  dustGeo.attributes.position.needsUpdate = true;
  // Fix 4: Dust homing near loop boundary
  const dustLoopT = time % 1800;
  const dustResetBlend = dustLoopT < 20 ? 1 - dustLoopT / 20 : dustLoopT > 1780 ? (dustLoopT - 1780) / 20 : 0;
  if (dustResetBlend > 0) {
    for (let i = 0; i < DUST_COUNT; i++) {
      const i3 = i * 3;
      const seed = Math.sin(i * 127.1 + 311.7) * 43758.5453;
      const homeX = (Math.abs(seed % 1) - 0.5) * 60;
      const homeY2 = (Math.abs(Math.sin(seed * 2.3) % 1)) * 20;
      const homeZ = (Math.abs(Math.sin(seed * 3.7) % 1) - 0.5) * 60;
      dPos[i3] += (homeX - dPos[i3]) * dustResetBlend * 0.03;
      dPos[i3+1] += (homeY2 - dPos[i3+1]) * dustResetBlend * 0.03;
      dPos[i3+2] += (homeZ - dPos[i3+2]) * dustResetBlend * 0.03;
    }
    dustGeo.attributes.position.needsUpdate = true;
  }

  // ── BREATHING + COLOUR ──
  const b = br(time), hue = (time/CCYCLE)%1;
  colT.setHSL(hue,0.85,0.50); colC.lerp(colT,0.008);
  // Fix 5: Colour lerp reset near loop boundary (v11 — exponential convergence)
  const colLoopT = time % 1800;
  if (colLoopT > 1790) {
    const colBlend = (colLoopT - 1790) / 10; // 0→1 over last 10 seconds
    const colEased = colBlend * colBlend * colBlend; // cubic
    colC.lerp(new THREE.Color(0.7, 0.5, 0.4), colEased * 0.15);
  }
  const tR=0.5+colC.r*0.5,tG=0.5+colC.g*0.5,tB=0.5+colC.b*0.5;
  // Ambient/hemi: richer tones — rose-amber ambient, violet-gold hemi
  ambient.color.setRGB(0.60*tR, 0.25*tG, 0.40*tB);   // vivid rose ambient
  hemi.color.setRGB(1.0*tR, 0.50*tG, 0.25*tB);       // hot golden sky
  hemi.groundColor.setRGB(0.15*tB, 0.08*tG, 0.30*tR); // deep violet ground
  rim.color.setRGB(0.25*tB, 0.20*tG, 0.70*tR);        // strong violet rim
  renderer.toneMappingExposure = 0.82+b*0.14; // match evening scene (was 1.0+b*0.18)
  hemi.intensity = 0.32+b*0.08;

  // ── SKY WARMTH ──
  const skyPhase = ((time + 100)/600)*Math.PI*2;  // 600s cycle = 3 full cycles in 30min, +100s offset
  const warmthRaw = (Math.sin(skyPhase)+1)/2;
  const warmth = Math.pow(warmthRaw, 0.5);  // pow(0.5) = wide warm phase ~6min per 10min cycle
  skySphereMat.uniforms.mixVal.value = 1.0 - warmth;  // warmth=1 → sky A (evening), warmth=0 → sky B (belfast)

  // Cloud bank colour sync — warm pink when evening sky, cool blue-grey when Belfast
  const cloudWarm = new THREE.Color(0.85, 0.40, 0.55); // vivid magenta-rose
  const cloudCool = new THREE.Color(0.40, 0.45, 0.80); // vivid blue-violet
  const cloudCol = cloudWarm.clone().lerp(cloudCool, 1.0 - warmth);
  for (let ci = 0; ci < cloudMeshes.length; ci++) {
    cloudMeshes[ci].material.uniforms.uSkyColor.value.copy(cloudCol);
  }
  // Dreamy tint: warm = amber/rose, cool = lavender — but NEVER suppress blue vividness
  skySphereMat.uniforms.tintColor.value.setRGB(
    0.94 + warmth * 0.11,                    // R: 0.94→1.05 (was 0.98→1.18)
    0.85 + warmth * 0.10,                    // G: 0.85→0.95 (was 0.78→0.93)
    0.92 + (1-warmth) * 0.10                 // B: 0.92→1.02 (was 0.90→1.08)
  );
  sun.intensity = 0.45+warmth*0.40+b*0.10; // match evening (was 0.55+0.50+0.15)
  // Sun: richer amber/rose during warm, cooler violet during cool
  sun.color.setRGB(
    tR*(0.85+warmth*0.20),                   // strong warm red
    0.45*tG*(0.5+warmth*0.5),                // less green = more magenta
    0.35*tB*(0.8+warmth*0.1)                 // hint of blue warmth
  );
  ambient.intensity = 0.28+warmth*0.10+b*0.06;
  // Fog: rose/lavender tint instead of neutral gray
  contentScene.fog.color.setRGB(
    0.48 + warmth * 0.10,                    // warm rose
    0.34 + warmth * 0.04,                    // subdued green
    0.48 + (1-warmth) * 0.08                 // cool = more blue/lavender
  );
  // Dust: warm gold during evening, soft violet during belfast
  dustMat.uniforms.uColor.value.setRGB(
    0.92 + warmth * 0.08,                    // warm gold
    0.70 + warmth * 0.15,                    // amber
    0.45 + (1-warmth) * 0.35                 // cool = violet dust
  );

  // ── STARS ──
  starMat.uniforms.uTime.value = time;
  starMat.uniforms.uOpacity.value = Math.pow(1-warmth,1.5)*0.55;

  // ── GOD RAYS ──
  const rayOp = warmth*0.40+0.08;
  for(const rm of rayMeshes){rm.material.opacity=rayOp;rm.rotation.z=Math.sin(time*0.05+rm.position.x*0.01)*0.03;}
  rayGroup.rotation.y = skySphere.rotation.y;

  // ── SHOOTING STAR (shallow sweeping streak) ──
  const ss = shootingStarState;
  if (!ss.active) {
    ss.timer -= dt;
    const loopT = time % 1800;
    if (ss.timer <= 0 && loopT > 2 && loopT < 1785) {
      ss.active = true;
      ss.tailBonus = 150 + Math.random() * 400;
      ss.maxLife = 3.5 + Math.random() * 2.5;
      ss.life = ss.maxLife;
      // Spawn in upper sky — original Cartesian velocity for natural curved arc
      const sTheta = Math.random() * Math.PI * 2;
      const sElev = (30 + Math.random() * 25) * Math.PI / 180;
      const sR = 340;
      ss.pos.set(Math.cos(sElev)*Math.cos(sTheta)*sR, Math.sin(sElev)*sR, Math.cos(sElev)*Math.sin(sTheta)*sR);
      const entryAngle = (2 + Math.random() * 5) * Math.PI / 180;
      const travelTheta = sTheta + 0.4 + Math.random() * 0.6;
      const speed = 120 + Math.random() * 80;
      ss.vel.set(
        Math.cos(travelTheta) * Math.cos(entryAngle) * speed,
        -Math.sin(entryAngle) * speed,
        Math.sin(travelTheta) * Math.cos(entryAngle) * speed
      );
      ssStreak.visible = true;
    }
  }
  if (ss.active) {
    ss.life -= dt;
    const progress = 1 - ss.life / ss.maxLife;
    let opacity;
    if (progress < 0.05) opacity = progress / 0.05;
    else if (progress < 0.6) opacity = 1.0;
    else opacity = Math.pow((1 - progress) / 0.4, 0.7);
    opacity = Math.max(0, opacity);
    // Move head in Cartesian space then re-project to dome — creates natural arc
    ss.pos.addScaledVector(ss.vel, dt);
    ss.pos.normalize().multiplyScalar(340);
    // Multi-segment streak: sample points backward along trajectory on dome surface
    const tailAngle = (0.65 + ss.tailBonus * 0.003);
    const velDir = ss.vel.clone().normalize();
    const p = ssGeo.attributes.position.array;
    const hw = 1.5;
    const sR2 = 340;
    for (let i = 0; i <= SS_SEGMENTS; i++) {
      const t = i / SS_SEGMENTS;  // 0=tail, 1=head
      // Walk backward from head along velocity direction, project each point onto dome
      const stepBack = tailAngle * (1 - t);
      const segPos = ss.pos.clone().addScaledVector(velDir, -stepBack * sR2);
      segPos.normalize().multiplyScalar(sR2);
      const px = segPos.x, py = segPos.y, pz = segPos.z;
      // Radial direction
      const radLen = Math.sqrt(px*px + py*py + pz*pz);
      const rx = px/radLen, ry = py/radLen, rz = pz/radLen;
      // Side vector: cross(velocity, radial) — perpendicular to streak on dome
      let sx = velDir.y*rz - velDir.z*ry;
      let sy = velDir.z*rx - velDir.x*rz;
      let sz = velDir.x*ry - velDir.y*rx;
      const sLen = Math.sqrt(sx*sx + sy*sy + sz*sz) || 1;
      sx /= sLen; sy /= sLen; sz /= sLen;
      const idx = i * 2 * 3;
      p[idx]   = px + sx * hw; p[idx+1] = py + sy * hw; p[idx+2] = pz + sz * hw;
      p[idx+3] = px - sx * hw; p[idx+4] = py - sy * hw; p[idx+5] = pz - sz * hw;
    }
    ssGeo.attributes.position.needsUpdate = true;
    ssStreak.position.set(0, 0, 0);
    ssStreak.rotation.set(0, 0, 0);
    ssStreak.scale.set(1, 1, 1);
    ssMat.uniforms.uOpacity.value = opacity;
    ssMat.uniforms.uColor.value.setRGB(1, 0.97 - progress * 0.05, 0.92 - progress * 0.1);
    if (ss.life <= 0) { ss.active = false; ssStreak.visible = false; ss.timer = 1.5 + Math.random() * 1; }
  }


  // ── PLANETS ──
  planetGroup.rotation.y = (time / 1800) * Math.PI * 2 * 2; saturnMainGroup.rotation.y = (time / 1800) * Math.PI * 2 * 1;
  if(planetMixer){const clip=planetMixer._actions&&planetMixer._actions[0]?planetMixer._actions[0].getClip():null;if(clip){const cd=clip.duration;const totalAnimTime=1800*0.15;const nC=Math.max(1,Math.round(totalAnimTime/cd));const loopAnimTime=nC*cd;planetMixer.setTime(((time%1800)/1800)*loopAnimTime);}}
  // Atmospheric haze colour sync — match sky warmth
  const hazeWarm = new THREE.Color(0.78, 0.55, 0.62);
  const hazeCool = new THREE.Color(0.50, 0.54, 0.68);
  const hazeCol = hazeWarm.clone().lerp(hazeCool, 1.0 - warmth);
  saturnHazeMat.color.copy(hazeCol);
  saturnHazeMat.opacity = 0.50 + b * 0.15;

  // ── BIRDS ──
  for(const bd of birdFlocks){
    bd.glideTimer-=dt;
    if(bd.glideTimer<=0){bd.isGliding=!bd.isGliding;
      bd.glideTimer=bd.isGliding? bd.glideDuration+Math.random()*2.0 : bd.flapDuration+Math.random()*2.5;
      bd.targetTimeScale=bd.isGliding? 0.25+Math.random()*0.15 : bd.baseTimeScale*0.75+Math.random()*bd.baseTimeScale*0.5;}
    // Wing ease — responsive but smooth
    bd.currentTimeScale+=(bd.targetTimeScale-bd.currentTimeScale)*0.4*dt;
    const flapWave = 1.0 + Math.sin(time * (0.5 + bd._fadeOffset * 0.2)) * 0.15
                         + Math.sin(time * (0.17 + bd._fadeOffset * 0.07)) * 0.08;
    bd.action.timeScale=Math.min(bd.currentTimeScale * flapWave, bd.baseTimeScale*1.8);bd.mixer.update(dt);

    // ── STRAIGHT-LINE BIRD FLIGHT ──
    // Birds fly in long straight lines. No orbiting, no homing, no circular patterns.
    // No loop boundary fade — birds are ALWAYS visible, never pop in/out.
    bd.turnChangeTimer-=dt;
    if(bd.turnChangeTimer<=0){
      bd.desiredTurnRate = Math.random() < 0.90 ? 0 : (Math.random()-0.5)*0.0015;
      bd.turnChangeTimer=25+Math.random()*35;
    }
    bd.turnRate+=(bd.desiredTurnRate-bd.turnRate)*0.03*dt;
    const maxTurn = 0.001 * dt * 30;
    bd.turnRate=Math.max(-maxTurn,Math.min(maxTurn,bd.turnRate));
    bd.heading+=bd.turnRate;
    bd.ctr.position.x+=Math.sin(bd.heading)*bd.cruiseSpeed*dt*30;
    bd.ctr.position.z+=Math.cos(bd.heading)*bd.cruiseSpeed*dt*30;

    // Inter-flock spacing — gentle push away from any flock that's too close
    const MIN_FLOCK_DIST = 6;  // minimum distance between flock centers
    for (const other of birdFlocks) {
      if (other === bd) continue;
      const dx = bd.ctr.position.x - other.ctr.position.x;
      const dz = bd.ctr.position.z - other.ctr.position.z;
      const flockDist = Math.sqrt(dx*dx + dz*dz);
      if (flockDist < MIN_FLOCK_DIST && flockDist > 0.1) {
        // Gentle push — stronger as they get closer
        const push = (1 - flockDist / MIN_FLOCK_DIST) * 0.02 * dt * 30;
        bd.ctr.position.x += (dx / flockDist) * push;
        bd.ctr.position.z += (dz / flockDist) * push;
      }
    }

    const px=bd.ctr.position.x,pz=bd.ctr.position.z,dist=Math.sqrt(px*px+pz*pz);

    // When bird exits the visible area, reposition at far edge
    if(dist>42){
      // Fully random entry point around the circle — prevents clustering
      const entryAngle = Math.random() * Math.PI * 2;
      const entryDist = 38 + Math.random() * 4;
      bd.ctr.position.x = Math.sin(entryAngle) * entryDist;
      bd.ctr.position.z = Math.cos(entryAngle) * entryDist;
      bd.ctr.position.y = bd.homeY + (Math.random()-0.5)*1.5;
      if (Math.random() < 0.7) {
        // HORIZONTAL: fly across the horizon
        const tangent = entryAngle + (Math.random() < 0.5 ? Math.PI/2 : -Math.PI/2);
        bd.heading = tangent + (Math.random()-0.5)*0.3;
      } else {
        // FRONT-TO-BACK: heading toward center
        const toCenterAngle = Math.atan2(-bd.ctr.position.x, -bd.ctr.position.z);
        bd.heading = toCenterAngle + (Math.random()-0.5)*0.6;
      }
      bd.turnRate = 0; bd.desiredTurnRate = 0;
      bd.turnChangeTimer = 15 + Math.random()*20;
      bd.vy = 0;
    }

    // Scale: distance-compensated only — no fading, no shrinking
    const rawDistScale = BIRD_REF_DIST / Math.max(15, dist);
    const distScale = 0.7 + 0.3 * rawDistScale;
    bd.ctr.scale.setScalar(distScale);
    bd.ctr.visible = true;  // ALWAYS visible — never pop in or out

    // Gentle altitude float
    const alt=bd.homeY+(bd.isGliding?-0.3:0.2);
    bd.vy+=(alt-bd.ctr.position.y)*0.02*dt;bd.vy*=Math.pow(0.97, dt*30);bd.ctr.position.y+=bd.vy;
    if(bd.ctr.position.y<2.8){bd.vy+=(2.8-bd.ctr.position.y)*0.05*dt;}
    if(bd.ctr.position.y>6.5){bd.vy-=(bd.ctr.position.y-6.5)*0.05*dt;}
    bd.ctr.position.y=Math.max(2.0, Math.min(7.5, bd.ctr.position.y));
    bd.vy = Math.max(-0.08, Math.min(0.08, bd.vy));
    // Banking — very subtle since birds barely turn
    bd.bankAngle+=(-bd.turnRate*4-bd.bankAngle)*1.2*dt;bd.ctr.rotation.z=bd.bankAngle;
    bd.pitchAngle+=(-bd.vy*2.0-bd.pitchAngle)*1.2*dt;bd.ctr.rotation.x=bd.pitchAngle;
    const flipBlend = Math.min(1, Math.max(0, (dist - 22) / 6));
    bd.ctr.rotation.y = bd.heading + Math.PI * (1 - flipBlend);
  }


  // ── RENDER 4 WALLS ──
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.setRenderTarget(null);
  // ── BALLOON HOUSE — 1-minute crossing ──
  // Pure position: starts far below, rises at constant speed, exits far above.
  // No visibility toggle — just position. It's always "there", just off-screen.
  {
    const t = time % 1800;
    const eventT = t - BH_EVENT_START;
    
    let y;
    if (eventT < 0) {
      y = BH_Y_START; // parked far below
    } else if (eventT > BH_EVENT_DUR) {
      y = BH_Y_END;   // parked far above
    } else {
      y = BH_Y_START + BH_SPEED * eventT; // rising
    }
    
    // Subtle horizontal drift during rise
    const drift = (eventT >= 0 && eventT <= BH_EVENT_DUR) ? eventT : 0;
    const driftX = 1.2 * Math.sin(drift * 0.05);
    const driftZ = 0.8 * Math.cos(drift * 0.07);
    
    balloonGroup.position.set(BH_X0 + driftX, y, BH_Z0 + driftZ);
    
    // Face camera + gentle sway
    balloonGroup.rotation.y = BH_ANGLE + Math.PI + drift * 0.003;
    balloonGroup.rotation.z = Math.sin(drift * 0.2) * 0.006;
    balloonGroup.rotation.x = Math.sin(drift * 0.15 + 1.0) * 0.004;
  }

  cubeCamera.update(renderer, contentScene);

  renderer.toneMapping = THREE.NoToneMapping;
  const cubeTex = cubeRT.texture;
  matFront.uniforms.tCube.value = cubeTex;
  matRight.uniforms.tCube.value = cubeTex;
  matBack.uniforms.tCube.value = cubeTex;
  matLeft.uniforms.tCube.value = cubeTex;

  renderer.setRenderTarget(rtFront); renderer.render(eqScnFront, eqCam);
  renderer.setRenderTarget(rtRight); renderer.render(eqScnRight, eqCam);
  renderer.setRenderTarget(rtBack);  renderer.render(eqScnBack, eqCam);
  renderer.setRenderTarget(rtLeft);  renderer.render(eqScnLeft, eqCam);

  renderer.setRenderTarget(null);
};

// Signal ready

// ── LIVE PREVIEW (browser only, skipped by Puppeteer) ──
if (!window.__SABDA_PUPPETEER__) {
  // Scrub UI
  const scrubDiv = document.createElement('div');
  scrubDiv.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:200;display:flex;align-items:center;gap:20px;background:rgba(0,0,0,0.7);padding:20px 40px;border-radius:12px;font-family:monospace;color:#c4a882;font-size:48px;';
  const slider = document.createElement('input');
  slider.type = 'range'; slider.min = 0; slider.max = 1800; slider.step = 1; slider.value = 0;
  slider.style.cssText = 'width:3000px;cursor:pointer;height:40px;';
  const info = document.createElement('span');
  info.style.cssText = 'min-width:900px;white-space:nowrap;';
  const playBtn = document.createElement('button');
  playBtn.textContent = '⏸'; playBtn.style.cssText = 'background:none;border:2px solid #c4a882;color:#c4a882;padding:10px 24px;border-radius:8px;cursor:pointer;font-size:48px;';
  scrubDiv.appendChild(playBtn);
  scrubDiv.appendChild(slider);
  scrubDiv.appendChild(info);
  document.body.appendChild(scrubDiv);

  let liveT = 0, playing = true, scrubbing = false, timeScale = 1;
  playBtn.onclick = () => { playing = !playing; playBtn.textContent = playing ? '⏸' : '▶'; };
  slider.oninput = () => { scrubbing = true; liveT = parseFloat(slider.value); };
  slider.onchange = () => { scrubbing = false; };
  document.addEventListener('keydown', e => {
    if (e.key === 't' || e.key === 'T') {
      timeScale = timeScale === 1 ? 30 : 1;
      info.style.color = timeScale > 1 ? '#ff6666' : '#c4a882';
    }
  });

  function liveLoop() {
    if (playing && !scrubbing) liveT += (1/30) * timeScale;
    if (liveT > 1800) liveT = 0;
    if (!scrubbing) slider.value = liveT;

    const mins = Math.floor(liveT/60), secs = Math.floor(liveT%60);
    const warmth = Math.pow((Math.sin((liveT/1800)*Math.PI*2)+1)/2, 2.5);
    const mix = 1.0 - warmth;
    info.textContent = `${mins}:${secs.toString().padStart(2,'0')} / 30:00  ${timeScale>1?'⚡'+timeScale+'x  ':''}warmth=${warmth.toFixed(2)}  mix=${mix.toFixed(2)} (${mix<0.1?'Evening':mix>0.9?'Belfast':'blend'})`;

    window.SABDA_RENDER_FRAME(liveT, timeScale);
    renderer.setRenderTarget(null);
    if(projMode === 0) {
      renderer.render(compScene, compCam);
    } else if(projMode === 1) {
      renderer.render(projTopScene, projTopCam);
    } else {
      renderer.render(projBotScene, projBotCam);
    }
    requestAnimationFrame(liveLoop);
  }
  document.getElementById('loading').classList.add('done');
  requestAnimationFrame(liveLoop);
}


</script>
