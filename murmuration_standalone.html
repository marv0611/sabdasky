<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<title>Murmuration v11</title>
<style>body{margin:0;overflow:hidden;background:#000}canvas{display:block}</style>
</head><body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════
// STARLING MURMURATION v11
// Direct implementation of Bialek, Cavagna, Giardina
// et al. PNAS 2012 — Self-Propelled Particle Model
// Equations 9-13 with exact parameter ratios
// ═══════════════════════════════════════════════════════

const N = 512;
const NC = 7; // topological neighbors

// Scale factor from paper units (r0=1) to scene units
const S = 3.0;

// Paper params scaled
const V0 = 0.06 * S;   // speed per timestep
const ALPHA = 25;        // alignment strength (was 35 — too dominant)
const BETA = 12;         // cohesion/repulsion strength (was 5 — too weak)
const R0 = 1.0 * S;     // max interaction distance
const RB = 0.2 * S;     // hard core repulsion
const RE = 0.5 * S;     // equilibrium distance
const RA = 0.8 * S;     // attraction boundary
const NC_NOISE = 3;      // noise strength (was 7 = NC — way too much)

const px = new Float32Array(N), py = new Float32Array(N), pz = new Float32Array(N);
const vx = new Float32Array(N), vy = new Float32Array(N), vz = new Float32Array(N);

// Init — cluster, all flying roughly same direction
const d0 = Math.random() * Math.PI * 2;
for (let i = 0; i < N; i++) {
  const a = Math.random() * Math.PI * 2;
  const r = Math.pow(Math.random(), 0.33) * 12;
  const elev = (Math.random() - 0.5) * 0.6;
  px[i] = Math.cos(a) * Math.cos(elev) * r;
  py[i] = Math.sin(elev) * r * 0.3; // flat
  pz[i] = Math.sin(a) * Math.cos(elev) * r;
  vx[i] = Math.cos(d0) * V0;
  vy[i] = 0;
  vz[i] = Math.sin(d0) * V0;
}

// Spatial grid
const GS = R0;
const grid = new Map();
function buildGrid() {
  grid.clear();
  for (let i = 0; i < N; i++) {
    const k = ((px[i]/GS)|0)+','+((py[i]/GS)|0)+','+((pz[i]/GS)|0);
    if (!grid.has(k)) grid.set(k, []);
    grid.get(k).push(i);
  }
}
function getNearby(x,y,z) {
  const r=[];
  const gx=(x/GS)|0,gy=(y/GS)|0,gz=(z/GS)|0;
  for(let a=-1;a<=1;a++)for(let b=-1;b<=1;b++)for(let c=-1;c<=1;c++){
    const cell=grid.get((gx+a)+','+(gy+b)+','+(gz+c));
    if(cell)for(const i of cell)r.push(i);
  }
  return r;
}

// Find NC nearest neighbors (topological, not metric)
function findNeighbors(i) {
  const near = getNearby(px[i], py[i], pz[i]);
  const cands = [];
  for (const j of near) {
    if (j === i) continue;
    const dx=px[i]-px[j], dy=py[i]-py[j], dz=pz[i]-pz[j];
    cands.push({ j, d2: dx*dx+dy*dy+dz*dz });
  }
  cands.sort((a,b) => a.d2 - b.d2);
  return cands.slice(0, NC);
}

// Distance-dependent force f_ij (Eqs 11-13)
// Returns force magnitude (positive = repulsion, negative = attraction)
// Direction is along e_ij (unit vector from j to i)
function distanceForce(rij) {
  if (rij < RB) return -100; // hard core repulsion
  if (rij < RA) return 0.25 * (rij - RE) / (RA - RE); // equilibrium spring
  if (rij < R0) return 0.5; // long-range: ATTRACTION toward neighbor
  return 0.2; // beyond R0: still pull gently to prevent escape
}

// Random unit vector on sphere
function randUnit() {
  const z = Math.random() * 2 - 1;
  const t = Math.random() * Math.PI * 2;
  const r = Math.sqrt(1 - z*z);
  return { x: r*Math.cos(t), y: z*0.3, z: r*Math.sin(t) }; // flatten Y noise
}

function update() {
  buildGrid();
  
  // Flock center (compute once)
  let fcx=0,fcy=0,fcz=0;
  for(let i=0;i<N;i++){fcx+=px[i];fcy+=py[i];fcz+=pz[i];}
  fcx/=N;fcy/=N;fcz/=N;
  
  // Compute new velocities (Eq 9)
  const nvx = new Float32Array(N), nvy = new Float32Array(N), nvz = new Float32Array(N);
  
  for (let i = 0; i < N; i++) {
    const nbs = findNeighbors(i);
    
    // Alignment: α * Σ v_j
    let aliX = 0, aliY = 0, aliZ = 0;
    for (const nb of nbs) {
      aliX += vx[nb.j];
      aliY += vy[nb.j];
      aliZ += vz[nb.j];
    }
    aliX *= ALPHA;
    aliY *= ALPHA;
    aliZ *= ALPHA;
    
    // Distance force: β * Σ f_ij
    let frcX = 0, frcY = 0, frcZ = 0;
    for (const nb of nbs) {
      const d = Math.sqrt(nb.d2);
      if (d < 0.001) continue;
      const f = distanceForce(d);
      // e_ij points from j to i (repulsion direction)
      const ex = (px[i]-px[nb.j])/d;
      const ey = (py[i]-py[nb.j])/d;
      const ez = (pz[i]-pz[nb.j])/d;
      // e_ij points from j to i (away from neighbor)
      // Convention: positive f = attraction, so we negate: -f*e = toward neighbor
      frcX += -f * ex * BETA;
      frcY += -f * ey * BETA;
      frcZ += -f * ez * BETA;
    }
    
    // Noise: nc * η_i (random unit vector scaled by nc)
    const eta = randUnit();
    const noiseX = NC_NOISE * eta.x;
    const noiseY = NC_NOISE * eta.y;
    const noiseZ = NC_NOISE * eta.z;
    
    // Sum (Eq 9 inside the brackets)
    let sumX = aliX + frcX + noiseX;
    let sumY = aliY + frcY + noiseY;
    let sumZ = aliZ + frcZ + noiseZ;
    
    // CENTER PULL — quadratic with distance from flock centroid
    const tox=fcx-px[i], toy=fcy-py[i], toz=fcz-pz[i];
    const fd=Math.sqrt(tox*tox+toy*toy+toz*toz);
    if(fd>0.1){
      const pull = 0.5 * fd;
      sumX += (tox/fd) * pull;
      sumY += (toy/fd) * pull * 0.3;
      sumZ += (toz/fd) * pull;
    }
    
    // Extra vertical flattening
    sumY -= py[i] * 2.0;
    
    // Normalize Θ and multiply by v0
    const len = Math.sqrt(sumX*sumX + sumY*sumY + sumZ*sumZ);
    if (len > 0.001) {
      nvx[i] = (sumX / len) * V0;
      nvy[i] = (sumY / len) * V0;
      nvz[i] = (sumZ / len) * V0;
    } else {
      nvx[i] = vx[i];
      nvy[i] = vy[i];
      nvz[i] = vz[i];
    }
  }
  
  // Apply (Eq 10): x(t+1) = x(t) + v(t+1)
  for (let i = 0; i < N; i++) {
    vx[i] = nvx[i];
    vy[i] = nvy[i];
    vz[i] = nvz[i];
    px[i] += vx[i];
    py[i] += vy[i];
    pz[i] += vz[i];
  }
}

// ═══ RENDERING ═══
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const skyCanvas = document.createElement('canvas');
skyCanvas.width = 1; skyCanvas.height = 512;
const sctx = skyCanvas.getContext('2d');
const grad = sctx.createLinearGradient(0, 0, 0, 512);
grad.addColorStop(0.0, '#2a1540');
grad.addColorStop(0.3, '#5a2068');
grad.addColorStop(0.5, '#b06080');
grad.addColorStop(0.65, '#d4726a');
grad.addColorStop(0.8, '#f0a06c');
grad.addColorStop(1.0, '#c9a882');
sctx.fillStyle = grad;
sctx.fillRect(0, 0, 1, 512);
scene.background = new THREE.CanvasTexture(skyCanvas);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 500);

// Bird silhouette
const bGeo = new THREE.BufferGeometry();
bGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array([
  0,0,-0.15, 0,0.03,-0.15, 0,0,0.3,
  0,0,-0.08, -0.25,0,0, 0,0,0.08,
  0,0,0.08, 0.25,0,0, 0,0,-0.08
]), 3));
bGeo.computeVertexNormals();
const bMat = new THREE.MeshBasicMaterial({ color: 0x080604, side: THREE.DoubleSide });
const meshes = [];
for(let i=0;i<N;i++){
  const m=new THREE.Mesh(bGeo,bMat);
  m.frustumCulled=false;
  scene.add(m);
  meshes.push(m);
}

let camCx=0,camCy=0,camCz=0;
let fpsFrames=0,fpsLast=performance.now();

function animate() {
  requestAnimationFrame(animate);
  
  // Run 2 simulation steps per frame for smoother movement
  update();
  update();
  
  for(let i=0;i<N;i++){
    meshes[i].position.set(px[i],py[i],pz[i]);
    const sp=Math.sqrt(vx[i]*vx[i]+vy[i]*vy[i]+vz[i]*vz[i]);
    if(sp>0.001)meshes[i].lookAt(px[i]+vx[i],py[i]+vy[i],pz[i]+vz[i]);
  }
  
  let cx=0,cy=0,cz=0;
  for(let i=0;i<N;i++){cx+=px[i];cy+=py[i];cz+=pz[i];}
  cx/=N;cy/=N;cz/=N;
  camCx+=(cx-camCx)*0.03;
  camCy+=(cy-camCy)*0.03;
  camCz+=(cz-camCz)*0.03;
  
  const ct=performance.now()*0.00001;
  camera.position.set(camCx+Math.sin(ct)*50, camCy+8, camCz+Math.cos(ct)*50);
  camera.lookAt(camCx,camCy,camCz);
  
  renderer.render(scene,camera);
  
  fpsFrames++;
  const now=performance.now();
  if(now-fpsLast>1000){
    document.title='Murmuration — '+fpsFrames+'fps';
    fpsFrames=0;fpsLast=now;
  }
}
animate();

window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>
</body></html>
