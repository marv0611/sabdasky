<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<title>Murmuration v8</title>
<style>body{margin:0;overflow:hidden;background:#000}canvas{display:block}</style>
</head><body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════
// STARLING MURMURATION v8
// Based on video study: turning waves propagate through
// tightly-packed 7-neighbor network with high inertia.
// The delay as the wave crosses the flock creates all
// the shapes — funnels, splits, stretches, compressions.
// ═══════════════════════════════════════════════════════

const N = 1000;
const K = 7;

// Position, velocity, acceleration
const px = new Float32Array(N), py = new Float32Array(N), pz = new Float32Array(N);
const vx = new Float32Array(N), vy = new Float32Array(N), vz = new Float32Array(N);
const ax = new Float32Array(N), ay = new Float32Array(N), az = new Float32Array(N);

// Per-bird properties
const turnInfluence = new Float32Array(N); // how much this bird is currently "turning" (wave propagation)

// Init — tightly packed flat ellipsoid, all flying same direction
const flightDir = Math.random() * Math.PI * 2;
const flightSpeed = 0.25;
for (let i = 0; i < N; i++) {
  // Pack birds into a flat disc — wider than tall
  // ~1.2 units apart on average (very dense)
  const angle = Math.random() * Math.PI * 2;
  const r = Math.pow(Math.random(), 0.5) * 12; // sqrt for uniform disc distribution
  px[i] = Math.cos(angle) * r;
  py[i] = (Math.random() - 0.5) * 4; // flat — only ±2 height
  pz[i] = Math.sin(angle) * r;
  
  // Everyone flying the same direction with tiny variation
  vx[i] = Math.cos(flightDir) * flightSpeed + (Math.random() - 0.5) * 0.02;
  vy[i] = (Math.random() - 0.5) * 0.005;
  vz[i] = Math.sin(flightDir) * flightSpeed + (Math.random() - 0.5) * 0.02;
  
  turnInfluence[i] = 0;
}

// Spatial grid
const GRID = 4;
const grid = new Map();
function gk(x, y, z) { return ((x/GRID)|0) + ',' + ((y/GRID)|0) + ',' + ((z/GRID)|0); }
function buildGrid() {
  grid.clear();
  for (let i = 0; i < N; i++) {
    const k = gk(px[i], py[i], pz[i]);
    if (!grid.has(k)) grid.set(k, []);
    grid.get(k).push(i);
  }
}
function nearby(x, y, z) {
  const r = [];
  const gx=(x/GRID)|0, gy=(y/GRID)|0, gz=(z/GRID)|0;
  for (let dx=-1;dx<=1;dx++) for (let dy=-1;dy<=1;dy++) for (let dz=-1;dz<=1;dz++) {
    const c = grid.get((gx+dx)+','+(gy+dy)+','+(gz+dz));
    if (c) for (const i of c) r.push(i);
  }
  return r;
}

// Find 7 nearest
const _nbs = new Array(K);
function findK(i) {
  const near = nearby(px[i], py[i], pz[i]);
  const candidates = [];
  const mx=px[i], my=py[i], mz=pz[i];
  for (const j of near) {
    if (j === i) continue;
    const dx=mx-px[j], dy=my-py[j], dz=mz-pz[j];
    candidates.push({ j, d2: dx*dx+dy*dy+dz*dz });
  }
  candidates.sort((a,b) => a.d2 - b.d2);
  const n = Math.min(K, candidates.length);
  for (let k = 0; k < n; k++) _nbs[k] = candidates[k];
  return n;
}

// ── TURNING WAVE SYSTEM ──
// A random bird initiates a turn. Its influence spreads
// through the neighbor network over many frames.
let waveTimer = 0;
let nextWave = 120 + Math.random() * 180; // 2-5 seconds between waves

function initiateWave() {
  // Pick a random bird on the edge of the flock (edges react first in nature)
  let edgeBird = 0;
  let maxDist = 0;
  // Find flock center
  let cx=0,cy=0,cz=0;
  for (let i=0;i<N;i++){cx+=px[i];cy+=py[i];cz+=pz[i];}
  cx/=N;cy/=N;cz/=N;
  // Sample 20 random birds, pick the furthest from center
  for (let s = 0; s < 20; s++) {
    const i = (Math.random()*N)|0;
    const dx=px[i]-cx, dy=py[i]-cy, dz=pz[i]-cz;
    const d = dx*dx+dy*dy+dz*dz;
    if (d > maxDist) { maxDist = d; edgeBird = i; }
  }
  
  // Give this bird a strong turn impulse
  const turnAngle = (Math.random() - 0.5) * 1.2; // ±0.6 radians change
  const currentAngle = Math.atan2(vz[edgeBird], vx[edgeBird]);
  const newAngle = currentAngle + turnAngle;
  const speed = Math.sqrt(vx[edgeBird]*vx[edgeBird] + vz[edgeBird]*vz[edgeBird]);
  
  // Set this bird's velocity to new direction
  vx[edgeBird] = Math.cos(newAngle) * speed;
  vz[edgeBird] = Math.sin(newAngle) * speed;
  vy[edgeBird] += (Math.random() - 0.5) * 0.03; // slight vertical
  turnInfluence[edgeBird] = 1.0; // mark as turning — neighbors will follow
}

// ── PARAMETERS ──
const SEPARATION_DIST = 1.0; // very close — less than a body length
const SEP_D2 = SEPARATION_DIST * SEPARATION_DIST;
const INERTIA = 0.975; // VERY high — turns propagate slowly across flock
const SPEED = 0.25; // constant cruising speed
const SPEED_VARIATION = 0.03;
const FLAT_DAMP = 0.92; // strong vertical flattening

function update() {
  buildGrid();
  
  // Wave timer
  waveTimer++;
  if (waveTimer >= nextWave) {
    initiateWave();
    waveTimer = 0;
    nextWave = 80 + Math.random() * 200; // 1.3-4.7 seconds
  }
  
  // Flock center for soft boundary
  let fcx=0,fcy=0,fcz=0;
  for (let i=0;i<N;i++){fcx+=px[i];fcy+=py[i];fcz+=pz[i];}
  fcx/=N;fcy/=N;fcz/=N;
  
  for (let i = 0; i < N; i++) {
    ax[i] = 0; ay[i] = 0; az[i] = 0;
    const n = findK(i);
    if (n === 0) continue;
    
    let sepX=0, sepY=0, sepZ=0;
    let aliVx=0, aliVy=0, aliVz=0;
    let cohX=0, cohY=0, cohZ=0;
    let maxNbTurn = 0;
    
    for (let k = 0; k < n; k++) {
      const j = _nbs[k].j;
      const d2 = _nbs[k].d2;
      
      // Separation — very short range
      if (d2 < SEP_D2 && d2 > 0.001) {
        const d = Math.sqrt(d2);
        const f = (SEPARATION_DIST - d) / SEPARATION_DIST;
        sepX += (px[i]-px[j]) / d * f;
        sepY += (py[i]-py[j]) / d * f;
        sepZ += (pz[i]-pz[j]) / d * f;
      }
      
      // Alignment — match neighbor velocity (THE key force)
      aliVx += vx[j];
      aliVy += vy[j];
      aliVz += vz[j];
      
      // Cohesion — toward neighbor center
      cohX += px[j];
      cohY += py[j];
      cohZ += pz[j];
      
      // Track turning wave
      if (turnInfluence[j] > maxNbTurn) maxNbTurn = turnInfluence[j];
    }
    
    // Average alignment target
    aliVx /= n; aliVy /= n; aliVz /= n;
    cohX /= n; cohY /= n; cohZ /= n;
    
    // Separation (gentle)
    ax[i] += sepX * 0.04;
    ay[i] += sepY * 0.04;
    az[i] += sepZ * 0.04;
    
    // Alignment — steer toward average neighbor velocity
    // This is what propagates the turning wave!
    ax[i] += (aliVx - vx[i]) * 0.08;
    ay[i] += (aliVy - vy[i]) * 0.08;
    az[i] += (aliVz - vz[i]) * 0.08;
    
    // Cohesion — toward neighbor center (keeps mass together)
    ax[i] += (cohX - px[i]) * 0.004;
    ay[i] += (cohY - py[i]) * 0.004;
    az[i] += (cohZ - pz[i]) * 0.004;
    
    // Propagate turn influence (decays as it spreads)
    if (maxNbTurn > turnInfluence[i] + 0.01) {
      turnInfluence[i] += (maxNbTurn - turnInfluence[i]) * 0.03;
    }
    
    // Vertical flattening — murmurations are flat
    ay[i] -= vy[i] * (1 - FLAT_DAMP);
    
    // Soft boundary — if too far from flock center, gentle pull back
    const tfx=fcx-px[i], tfy=fcy-py[i], tfz=fcz-pz[i];
    const fd = Math.sqrt(tfx*tfx+tfy*tfy+tfz*tfz);
    if (fd > 20) {
      const pull = (fd - 20) * 0.0008;
      ax[i] += (tfx/fd) * pull;
      ay[i] += (tfy/fd) * pull;
      az[i] += (tfz/fd) * pull;
    }
  }
  
  // Apply acceleration with high inertia
  for (let i = 0; i < N; i++) {
    // High inertia blend — bird keeps 97.5% of old velocity
    vx[i] = vx[i] * INERTIA + (vx[i] + ax[i]) * (1 - INERTIA);
    vy[i] = vy[i] * INERTIA + (vy[i] + ay[i]) * (1 - INERTIA);
    vz[i] = vz[i] * INERTIA + (vz[i] + az[i]) * (1 - INERTIA);
    
    // Maintain constant speed (starlings fly at constant speed — shape changes
    // come from direction, not speed changes)
    const spd = Math.sqrt(vx[i]*vx[i] + vy[i]*vy[i] + vz[i]*vz[i]);
    const targetSpeed = SPEED + (Math.sin(i * 0.1) * SPEED_VARIATION); // slight individual variation
    if (spd > 0.001) {
      const s = targetSpeed / spd;
      vx[i] *= s;
      vy[i] *= s;
      vz[i] *= s;
    }
    
    px[i] += vx[i];
    py[i] += vy[i];
    pz[i] += vz[i];
    
    // Decay turn influence
    turnInfluence[i] *= 0.98;
  }
}

// ═══ RENDERING ═══
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const skyCanvas = document.createElement('canvas');
skyCanvas.width = 1; skyCanvas.height = 512;
const skyCtx = skyCanvas.getContext('2d');
const grad = skyCtx.createLinearGradient(0, 0, 0, 512);
grad.addColorStop(0.0, '#2a1540');
grad.addColorStop(0.25, '#5a2068');
grad.addColorStop(0.45, '#b06080');
grad.addColorStop(0.6, '#d4726a');
grad.addColorStop(0.75, '#f0a06c');
grad.addColorStop(0.9, '#e8c89e');
grad.addColorStop(1.0, '#c9a882');
skyCtx.fillStyle = grad;
skyCtx.fillRect(0, 0, 1, 512);
scene.background = new THREE.CanvasTexture(skyCanvas);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);

// Bird shape — small dark silhouette (will be replaced with 3D starling later)
const bGeo = new THREE.BufferGeometry();
bGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array([
  0, 0, -0.2,   0, 0.04, -0.2,   0, 0, 0.35,   // body
  0, 0, -0.12,  -0.3, 0, 0,      0, 0, 0.12,    // left wing
  0, 0, 0.12,   0.3, 0, 0,       0, 0, -0.12    // right wing
]), 3));
bGeo.computeVertexNormals();
const bMat = new THREE.MeshBasicMaterial({ color: 0x080604, side: THREE.DoubleSide });

const meshes = [];
for (let i = 0; i < N; i++) {
  const m = new THREE.Mesh(bGeo, bMat);
  m.frustumCulled = false;
  scene.add(m);
  meshes.push(m);
}

function animate() {
  requestAnimationFrame(animate);
  update();
  
  for (let i = 0; i < N; i++) {
    meshes[i].position.set(px[i], py[i], pz[i]);
    const sp = Math.sqrt(vx[i]*vx[i] + vy[i]*vy[i] + vz[i]*vz[i]);
    if (sp > 0.001) {
      meshes[i].lookAt(px[i] + vx[i], py[i] + vy[i], pz[i] + vz[i]);
    }
  }
  
  // Camera: slow orbit around flock, far enough to see the mass
  let cx = 0, cy = 0, cz = 0;
  for (let i = 0; i < N; i++) { cx += px[i]; cy += py[i]; cz += pz[i]; }
  cx /= N; cy /= N; cz /= N;
  const ct = performance.now() * 0.00001;
  camera.position.set(cx + Math.sin(ct) * 60, cy + 8, cz + Math.cos(ct) * 60);
  camera.lookAt(cx, cy, cz);
  
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body></html>
