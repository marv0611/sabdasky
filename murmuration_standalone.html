<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<title>Murmuration v15</title>
<style>body{margin:0;overflow:hidden;background:#000}canvas{display:block}</style>
</head><body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════
// STARLING MURMURATION v15
// Direct acceleration → velocity. No inertia blend.
// No normalization. Crisp, responsive movement.
// Speed clamped. Forces are small accelerations.
// ═══════════════════════════════════════════════════════

const N = 800;
const NC = 7;
const MIN_SPEED = 0.2;
const MAX_SPEED = 0.45;

const px=new Float32Array(N),py=new Float32Array(N),pz=new Float32Array(N);
const vx=new Float32Array(N),vy=new Float32Array(N),vz=new Float32Array(N);

const d0=Math.random()*Math.PI*2;
for(let i=0;i<N;i++){
  const a=Math.random()*Math.PI*2;
  const r=Math.sqrt(Math.random())*20;
  px[i]=Math.cos(a)*r;
  py[i]=(Math.random()-0.5)*4;
  pz[i]=Math.sin(a)*r;
  const va=d0+(Math.random()-0.5)*0.3;
  const sp=0.25+Math.random()*0.1;
  vx[i]=Math.cos(va)*sp;
  vy[i]=(Math.random()-0.5)*0.005;
  vz[i]=Math.sin(va)*sp;
}

// Spatial grid — search radius 2 cells
const GS=5;
const grid=new Map();
function buildGrid(){
  grid.clear();
  for(let i=0;i<N;i++){
    const k=((px[i]/GS)|0)+','+((py[i]/GS)|0)+','+((pz[i]/GS)|0);
    if(!grid.has(k))grid.set(k,[]);
    grid.get(k).push(i);
  }
}
function getNearby(x,y,z){
  const r=[];
  const gx=(x/GS)|0,gy=(y/GS)|0,gz=(z/GS)|0;
  for(let a=-2;a<=2;a++)for(let b=-1;b<=1;b++)for(let c=-2;c<=2;c++){
    const cell=grid.get((gx+a)+','+(gy+b)+','+(gz+c));
    if(cell)for(const i of cell)r.push(i);
  }
  return r;
}
function findK(i){
  const near=getNearby(px[i],py[i],pz[i]);
  const c=[];
  for(const j of near){
    if(j===i)continue;
    const dx=px[i]-px[j],dy=py[i]-py[j],dz=pz[i]-pz[j];
    c.push({j,d2:dx*dx+dy*dy+dz*dz});
  }
  c.sort((a,b)=>a.d2-b.d2);
  return c.slice(0,NC);
}

// Edge perturbation
let pT=0,pN=35;
function perturb(){
  let fcx=0,fcy=0,fcz=0;
  for(let i=0;i<N;i++){fcx+=px[i];fcy+=py[i];fcz+=pz[i];}
  fcx/=N;fcy/=N;fcz/=N;
  let best=0,bestD=0;
  for(let s=0;s<50;s++){
    const i=(Math.random()*N)|0;
    const dx=px[i]-fcx,dz=pz[i]-fcz;
    if(dx*dx+dz*dz>bestD){bestD=dx*dx+dz*dz;best=i;}
  }
  const turn=(Math.random()-0.5)*2.5;
  const pr=3+Math.random()*5;
  for(let i=0;i<N;i++){
    const dx=px[i]-px[best],dy=py[i]-py[best],dz=pz[i]-pz[best];
    const d=Math.sqrt(dx*dx+dy*dy+dz*dz);
    if(d<pr){
      const f=1-(d/pr);
      const ca=Math.atan2(vz[i],vx[i]);
      const na=ca+turn*f*f;
      const sp=Math.sqrt(vx[i]*vx[i]+vz[i]*vz[i]);
      vx[i]=Math.cos(na)*sp;
      vz[i]=Math.sin(na)*sp;
    }
  }
}

function update(){
  buildGrid();
  pT++;
  if(pT>=pN){perturb();pT=0;pN=25+Math.random()*50;}
  
  let fcx=0,fcy=0,fcz=0;
  for(let i=0;i<N;i++){fcx+=px[i];fcy+=py[i];fcz+=pz[i];}
  fcx/=N;fcy/=N;fcz/=N;
  
  for(let i=0;i<N;i++){
    let ax=0,ay=0,az=0;
    const nbs=findK(i);
    
    if(nbs.length>0){
      // ALIGNMENT — steer toward avg neighbor velocity
      // This is a small acceleration, not a velocity replacement
      let avx=0,avy=0,avz=0;
      for(const nb of nbs){avx+=vx[nb.j];avy+=vy[nb.j];avz+=vz[nb.j];}
      avx/=nbs.length;avy/=nbs.length;avz/=nbs.length;
      // Acceleration = difference * strength
      ax+=(avx-vx[i])*0.06;
      ay+=(avy-vy[i])*0.06;
      az+=(avz-vz[i])*0.06;
      
      // COLLISION AVOIDANCE
      for(const nb of nbs){
        const d=Math.sqrt(nb.d2);
        if(d<0.8&&d>0.01){
          const s=(0.8-d)/0.8;
          ax+=(px[i]-px[nb.j])/d*s*0.03;
          ay+=(py[i]-py[nb.j])/d*s*0.01;
          az+=(pz[i]-pz[nb.j])/d*s*0.03;
        }
      }
    }
    
    // CENTER PULL — very weak, linear with distance
    const tox=fcx-px[i],toy=fcy-py[i],toz=fcz-pz[i];
    const fd=Math.sqrt(tox*tox+toy*toy+toz*toz);
    if(fd>0.1){
      const pull=0.0004*fd; // at dist 30: accel = 0.012. At dist 50: 0.02
      ax+=(tox/fd)*pull;
      ay+=(toy/fd)*pull*0.2;
      az+=(toz/fd)*pull;
    }
    
    // NOISE — tiny random acceleration
    ax+=(Math.random()-0.5)*0.008;
    az+=(Math.random()-0.5)*0.008;
    ay+=(Math.random()-0.5)*0.002;
    
    // FLATTEN
    ay-=vy[i]*0.15;
    ay-=(py[i]-fcy)*0.008;
    
    // APPLY acceleration directly to velocity
    vx[i]+=ax;
    vy[i]+=ay;
    vz[i]+=az;
    
    // CLAMP speed
    const spd=Math.sqrt(vx[i]*vx[i]+vy[i]*vy[i]+vz[i]*vz[i]);
    if(spd>MAX_SPEED){const s=MAX_SPEED/spd;vx[i]*=s;vy[i]*=s;vz[i]*=s;}
    else if(spd<MIN_SPEED&&spd>0.001){const s=MIN_SPEED/spd;vx[i]*=s;vy[i]*=s;vz[i]*=s;}
    
    // MOVE
    px[i]+=vx[i];
    py[i]+=vy[i];
    pz[i]+=vz[i];
  }
}

// ═══ RENDERING ═══
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
document.body.appendChild(renderer.domElement);

const scene=new THREE.Scene();
const sc=document.createElement('canvas');
sc.width=1;sc.height=512;
const sx=sc.getContext('2d');
const g=sx.createLinearGradient(0,0,0,512);
g.addColorStop(0.0,'#2a1540');g.addColorStop(0.3,'#5a2068');
g.addColorStop(0.5,'#b06080');g.addColorStop(0.65,'#d4726a');
g.addColorStop(0.8,'#f0a06c');g.addColorStop(1.0,'#c9a882');
sx.fillStyle=g;sx.fillRect(0,0,1,512);
scene.background=new THREE.CanvasTexture(sc);

const camera=new THREE.PerspectiveCamera(50,window.innerWidth/window.innerHeight,0.1,800);

const bGeo=new THREE.BufferGeometry();
bGeo.setAttribute('position',new THREE.BufferAttribute(new Float32Array([
  0,0,-0.12,0,0.025,-0.12,0,0,0.22,
  0,0,-0.06,-0.2,0,0,0,0,0.06,
  0,0,0.06,0.2,0,0,0,0,-0.06
]),3));
bGeo.computeVertexNormals();
const bMat=new THREE.MeshBasicMaterial({color:0x080604,side:THREE.DoubleSide});
const meshes=[];
for(let i=0;i<N;i++){
  const m=new THREE.Mesh(bGeo,bMat);
  m.frustumCulled=false;
  scene.add(m);
  meshes.push(m);
}

let camCx=0,camCy=0,camCz=0;
let fpsF=0,fpsL=performance.now();

function animate(){
  requestAnimationFrame(animate);
  update();
  
  for(let i=0;i<N;i++){
    meshes[i].position.set(px[i],py[i],pz[i]);
    const sp=Math.sqrt(vx[i]*vx[i]+vy[i]*vy[i]+vz[i]*vz[i]);
    if(sp>0.001)meshes[i].lookAt(px[i]+vx[i],py[i]+vy[i],pz[i]+vz[i]);
  }
  
  let cx=0,cy=0,cz=0;
  for(let i=0;i<N;i++){cx+=px[i];cy+=py[i];cz+=pz[i];}
  cx/=N;cy/=N;cz/=N;
  camCx+=(cx-camCx)*0.15;camCy+=(cy-camCy)*0.15;camCz+=(cz-camCz)*0.15;
  
  const ct=performance.now()*0.000008;
  camera.position.set(camCx+Math.sin(ct)*55,camCy+8,camCz+Math.cos(ct)*55);
  camera.lookAt(camCx,camCy,camCz);
  
  renderer.render(scene,camera);
  
  fpsF++;const now=performance.now();
  if(now-fpsL>1000){document.title='Murmuration — '+fpsF+'fps';fpsF=0;fpsL=now;}
}
animate();

window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>
</body></html>
