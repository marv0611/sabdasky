<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<title>Murmuration v13</title>
<style>body{margin:0;overflow:hidden;background:#000}canvas{display:block}</style>
</head><body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════
// STARLING MURMURATION v13
// No equilibrium spring. Density is FREE to vary.
// Only: collision avoidance + alignment + center pull.
// Shape changes from edge perturbation waves stretching
// and compressing the mass.
// ═══════════════════════════════════════════════════════

const N = 512;
const NC = 7;
const V0 = 0.25;          // faster — birds cover more ground

// Force weights
const W_ALIGN = 4;        // halved — allows directional diversity
const W_REPEL = 3;        // collision avoidance
const REPEL_DIST = 0.6;
const W_CENTER = 0.04;    // 7x weaker — flock can spread WIDE before reconverging
const W_NOISE = 1.5;     // organic variation

const px = new Float32Array(N), py = new Float32Array(N), pz = new Float32Array(N);
const vx = new Float32Array(N), vy = new Float32Array(N), vz = new Float32Array(N);

const d0 = Math.random() * Math.PI * 2;
for (let i = 0; i < N; i++) {
  // Start spread out wide
  const a = Math.random() * Math.PI * 2;
  const r = Math.sqrt(Math.random()) * 25;
  px[i] = Math.cos(a) * r;
  py[i] = (Math.random() - 0.5) * 5;
  pz[i] = Math.sin(a) * r;
  // All same direction with slight variation
  const va = d0 + (Math.random()-0.5)*0.3;
  vx[i] = Math.cos(va) * V0;
  vy[i] = (Math.random()-0.5) * 0.01;
  vz[i] = Math.sin(va) * V0;
}

// Spatial grid
const GS = 6;
const grid = new Map();
function buildGrid() {
  grid.clear();
  for (let i = 0; i < N; i++) {
    const k = ((px[i]/GS)|0)+','+((py[i]/GS)|0)+','+((pz[i]/GS)|0);
    if (!grid.has(k)) grid.set(k, []);
    grid.get(k).push(i);
  }
}
function getNearby(x,y,z) {
  const r=[];
  const gx=(x/GS)|0,gy=(y/GS)|0,gz=(z/GS)|0;
  for(let a=-1;a<=1;a++)for(let b=-1;b<=1;b++)for(let c=-1;c<=1;c++){
    const cell=grid.get((gx+a)+','+(gy+b)+','+(gz+c));
    if(cell)for(const i of cell)r.push(i);
  }
  return r;
}

function findK(i) {
  const near=getNearby(px[i],py[i],pz[i]);
  const c=[];
  for(const j of near){
    if(j===i)continue;
    const dx=px[i]-px[j],dy=py[i]-py[j],dz=pz[i]-pz[j];
    c.push({j,d2:dx*dx+dy*dy+dz*dz});
  }
  c.sort((a,b)=>a.d2-b.d2);
  return c.slice(0,NC);
}

// ── EDGE PERTURBATION ──
let perturbTimer = 0;
let nextPerturb = 50;

function perturbEdge() {
  let fcx=0,fcy=0,fcz=0;
  for(let i=0;i<N;i++){fcx+=px[i];fcy+=py[i];fcz+=pz[i];}
  fcx/=N;fcy/=N;fcz/=N;
  
  let best=0,bestD=0;
  for(let s=0;s<40;s++){
    const i=(Math.random()*N)|0;
    const dx=px[i]-fcx,dz=pz[i]-fcz;
    if(dx*dx+dz*dz>bestD){bestD=dx*dx+dz*dz;best=i;}
  }
  
  // Massive turn at edge — this is what stretches the flock apart
  const turnAngle = (Math.random()-0.5) * 3.0; // up to ±86 degrees!
  const patchRadius = 4 + Math.random() * 6; // bigger patches
  
  for(let i=0;i<N;i++){
    const dx=px[i]-px[best],dy=py[i]-py[best],dz=pz[i]-pz[best];
    const d=Math.sqrt(dx*dx+dy*dy+dz*dz);
    if(d < patchRadius){
      const f = 1 - (d/patchRadius);
      const ca = Math.atan2(vz[i],vx[i]);
      const na = ca + turnAngle * f * f;
      const sp = Math.sqrt(vx[i]*vx[i]+vz[i]*vz[i]);
      vx[i] = Math.cos(na) * sp;
      vz[i] = Math.sin(na) * sp;
    }
  }
}

function update() {
  buildGrid();
  
  perturbTimer++;
  if(perturbTimer>=nextPerturb){
    perturbEdge();
    perturbTimer=0;
    nextPerturb = 20 + Math.random()*40; // very frequent: every 0.3-1s
  }
  
  let fcx=0,fcy=0,fcz=0;
  for(let i=0;i<N;i++){fcx+=px[i];fcy+=py[i];fcz+=pz[i];}
  fcx/=N;fcy/=N;fcz/=N;
  
  const nvx=new Float32Array(N),nvy=new Float32Array(N),nvz=new Float32Array(N);
  
  for (let i = 0; i < N; i++) {
    const nbs = findK(i);
    let sumX=0, sumY=0, sumZ=0;
    
    if (nbs.length > 0) {
      // ── ALIGNMENT — normalized average direction ──
      let avx=0,avy=0,avz=0;
      for(const nb of nbs){avx+=vx[nb.j];avy+=vy[nb.j];avz+=vz[nb.j];}
      let al=Math.sqrt(avx*avx+avy*avy+avz*avz);
      if(al>0.001){avx/=al;avy/=al;avz/=al;}
      sumX += avx * W_ALIGN;
      sumY += avy * W_ALIGN;
      sumZ += avz * W_ALIGN;
      
      // ── COLLISION AVOIDANCE ONLY — no equilibrium, no attraction ──
      for(const nb of nbs){
        const d = Math.sqrt(nb.d2);
        if(d < REPEL_DIST && d > 0.01){
          const strength = (REPEL_DIST - d) / REPEL_DIST; // 1 at d=0, 0 at d=REPEL_DIST
          const ex=(px[i]-px[nb.j])/d, ey=(py[i]-py[nb.j])/d, ez=(pz[i]-pz[nb.j])/d;
          sumX += ex * strength * W_REPEL;
          sumY += ey * strength * W_REPEL * 0.3;
          sumZ += ez * strength * W_REPEL;
        }
      }
      // NO attraction between neighbors. NO equilibrium distance.
      // Density is FREE. Dense areas just happen. Sparse areas just happen.
    }
    
    // ── CENTER PULL — the ONLY thing keeping the mass together globally ──
    const tox=fcx-px[i],toy=fcy-py[i],toz=fcz-pz[i];
    const fd=Math.sqrt(tox*tox+toy*toy+toz*toz);
    if(fd>0.1){
      const pull = W_CENTER * fd; // linear with distance
      sumX += (tox/fd)*pull;
      sumY += (toy/fd)*pull*0.3;
      sumZ += (toz/fd)*pull;
    }
    
    // ── NOISE ──
    const t=Math.random()*Math.PI*2, z2=(Math.random()-0.5)*0.3;
    const rr=Math.sqrt(1-z2*z2);
    sumX += Math.cos(t)*rr*W_NOISE;
    sumY += z2*W_NOISE;
    sumZ += Math.sin(t)*rr*W_NOISE;
    
    // ── FLATTEN ──
    sumY -= vy[i]*4;
    sumY -= (py[i]-fcy)*0.4;
    
    // ── NORMALIZE to V0 ──
    const len=Math.sqrt(sumX*sumX+sumY*sumY+sumZ*sumZ);
    if(len>0.001){
      nvx[i]=(sumX/len)*V0;
      nvy[i]=(sumY/len)*V0;
      nvz[i]=(sumZ/len)*V0;
    } else {
      nvx[i]=vx[i];nvy[i]=vy[i];nvz[i]=vz[i];
    }
  }
  
  for(let i=0;i<N;i++){
    vx[i]=nvx[i];vy[i]=nvy[i];vz[i]=nvz[i];
    px[i]+=vx[i];py[i]+=vy[i];pz[i]+=vz[i];
  }
}

// ═══ RENDERING ═══
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
document.body.appendChild(renderer.domElement);

const scene=new THREE.Scene();
const skyCanvas=document.createElement('canvas');
skyCanvas.width=1;skyCanvas.height=512;
const sctx=skyCanvas.getContext('2d');
const grad=sctx.createLinearGradient(0,0,0,512);
grad.addColorStop(0.0,'#2a1540');
grad.addColorStop(0.3,'#5a2068');
grad.addColorStop(0.5,'#b06080');
grad.addColorStop(0.65,'#d4726a');
grad.addColorStop(0.8,'#f0a06c');
grad.addColorStop(1.0,'#c9a882');
sctx.fillStyle=grad;
sctx.fillRect(0,0,1,512);
scene.background=new THREE.CanvasTexture(skyCanvas);

const camera=new THREE.PerspectiveCamera(50,window.innerWidth/window.innerHeight,0.1,500);

const bGeo=new THREE.BufferGeometry();
bGeo.setAttribute('position',new THREE.BufferAttribute(new Float32Array([
  0,0,-0.12,0,0.025,-0.12,0,0,0.22,
  0,0,-0.06,-0.2,0,0,0,0,0.06,
  0,0,0.06,0.2,0,0,0,0,-0.06
]),3));
bGeo.computeVertexNormals();
const bMat=new THREE.MeshBasicMaterial({color:0x080604,side:THREE.DoubleSide});
const meshes=[];
for(let i=0;i<N;i++){
  const m=new THREE.Mesh(bGeo,bMat);
  m.frustumCulled=false;
  scene.add(m);
  meshes.push(m);
}

let camCx=0,camCy=0,camCz=0;
let fpsF=0,fpsL=performance.now();

function animate(){
  requestAnimationFrame(animate);
  update();update(); // 2 steps/frame
  
  for(let i=0;i<N;i++){
    meshes[i].position.set(px[i],py[i],pz[i]);
    const sp=Math.sqrt(vx[i]*vx[i]+vy[i]*vy[i]+vz[i]*vz[i]);
    if(sp>0.001)meshes[i].lookAt(px[i]+vx[i],py[i]+vy[i],pz[i]+vz[i]);
  }
  
  let cx=0,cy=0,cz=0;
  for(let i=0;i<N;i++){cx+=px[i];cy+=py[i];cz+=pz[i];}
  cx/=N;cy/=N;cz/=N;
  camCx+=(cx-camCx)*0.03;camCy+=(cy-camCy)*0.03;camCz+=(cz-camCz)*0.03;
  
  const ct=performance.now()*0.00001;
  camera.position.set(camCx+Math.sin(ct)*80,camCy+10,camCz+Math.cos(ct)*80);
  camera.lookAt(camCx,camCy,camCz);
  
  renderer.render(scene,camera);
  
  fpsF++;const now=performance.now();
  if(now-fpsL>1000){document.title='Murmuration — '+fpsF+'fps';fpsF=0;fpsL=now;}
}
animate();

window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>
</body></html>
