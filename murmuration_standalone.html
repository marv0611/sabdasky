<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<title>Murmuration v6</title>
<style>body{margin:0;overflow:hidden;background:#000}canvas{display:block}</style>
</head><body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════
// STARLING MURMURATION — exact reference parameters
// from Alex-Scott-NZ/Murmuration working demo
// ═══════════════════════════════════════════════════════

const N = 1000;
const K = 7;

// EXACT reference defaults (from controls.js)
const P = {
  separation: 0.08,
  alignment: 0.15,
  cohesion: 0.003,
  noiseIntensity: 0.5,
  protectedRange: 8,
  visualRange: 35,
  maxSpeed: 4,
  minSpeed: 2,
  speedMultiplier: 1.0,
  centerAttraction: 0.0,   // ZERO — no center pull!
  groupTension: 0.5,
};

// State arrays
const pos = [], vel = [], acc = [], mom = [];
const personality = [];
const confidence = new Float32Array(N);
const leadership = new Float32Array(N);
const lastDirChange = new Float32Array(N);

// Scale factor: reference is 2D pixels (1920x1080), we're in 3D units
// Reference visualRange=35px. We'll use same scale — birds live in ~200-unit space
const initDir = Math.random() * Math.PI * 2;
for (let i = 0; i < N; i++) {
  // Multiple starting clusters like reference
  const cluster = Math.floor(Math.random() * 4);
  const clusterAngle = (cluster / 4) * Math.PI * 2;
  const cx = Math.cos(clusterAngle) * 30;
  const cz = Math.sin(clusterAngle) * 30;
  
  pos.push({
    x: cx + (Math.random()-0.5) * 20,
    y: (Math.random()-0.5) * 10,
    z: cz + (Math.random()-0.5) * 20
  });
  // Initial velocity — mostly aligned, some variance (from reference: ±4)
  const spd = 2 + Math.random() * 2;
  vel.push({
    x: Math.cos(initDir) * spd + (Math.random()-0.5) * 1,
    y: (Math.random()-0.5) * 0.5,
    z: Math.sin(initDir) * spd + (Math.random()-0.5) * 1
  });
  acc.push({x:0,y:0,z:0});
  mom.push({x:0,y:0,z:0});
  confidence[i] = 0.5 + Math.random() * 0.5;
  leadership[i] = 0;
  lastDirChange[i] = -5000;
  personality.push({
    aggressiveness: 0.3 + Math.random() * 0.7,
    sociability: 0.4 + Math.random() * 0.6,
    followTendency: 0.3 + Math.random() * 0.7,
    independence: Math.random() * 0.4,
    leaderChance: Math.random() * 0.3,
    energy: 0.7 + Math.random() * 0.3,
  });
}

// Spatial grid for fast neighbor finding
const GRID_SIZE = P.visualRange;
const grid = new Map();

function gridKey(x, y, z) {
  return `${Math.floor(x/GRID_SIZE)},${Math.floor(y/GRID_SIZE)},${Math.floor(z/GRID_SIZE)}`;
}

function buildGrid() {
  grid.clear();
  for (let i = 0; i < N; i++) {
    const k = gridKey(pos[i].x, pos[i].y, pos[i].z);
    if (!grid.has(k)) grid.set(k, []);
    grid.get(k).push(i);
  }
}

function getNearbyCells(x, y, z) {
  const result = [];
  const gx = Math.floor(x/GRID_SIZE), gy = Math.floor(y/GRID_SIZE), gz = Math.floor(z/GRID_SIZE);
  for (let dx = -1; dx <= 1; dx++)
    for (let dy = -1; dy <= 1; dy++)
      for (let dz = -1; dz <= 1; dz++) {
        const cell = grid.get(`${gx+dx},${gy+dy},${gz+dz}`);
        if (cell) for (const idx of cell) result.push(idx);
      }
  return result;
}

function findKNearest(i) {
  const nearby = getNearbyCells(pos[i].x, pos[i].y, pos[i].z);
  const vrSq = P.visualRange * P.visualRange;
  const px = pos[i].x, py = pos[i].y, pz = pos[i].z;
  const candidates = [];
  
  for (const j of nearby) {
    if (j === i) continue;
    const dx = px-pos[j].x, dy = py-pos[j].y, dz = pz-pos[j].z;
    const dSq = dx*dx + dy*dy + dz*dz;
    if (dSq < vrSq) candidates.push({idx:j, dSq});
  }
  candidates.sort((a,b) => a.dSq - b.dSq);
  return candidates.slice(0, K);
}

// Flow field disturbances (from flock.js)
const flowFields = [];
let lastFlowUpdate = 0;

function updateFlowFields(time) {
  if (time - lastFlowUpdate > 5000) {
    lastFlowUpdate = time;
    if (Math.random() < 0.3) {
      flowFields.push({
        x: (Math.random()-0.5) * 150,
        y: (Math.random()-0.5) * 50,
        z: (Math.random()-0.5) * 150,
        strength: 0.5 + Math.random() * 1.0,
        radius: 30 + Math.random() * 60,
        angle: Math.random() * Math.PI * 2,
        elev: (Math.random()-0.5) * 0.5,
        lifetime: 10000 + Math.random() * 20000,
        created: time
      });
    }
  }
  // Remove expired
  for (let i = flowFields.length - 1; i >= 0; i--) {
    if (time - flowFields[i].created > flowFields[i].lifetime) flowFields.splice(i, 1);
  }
}

function update() {
  const time = performance.now();
  buildGrid();
  updateFlowFields(time);
  
  // Flock center for boundary
  let fcx=0,fcy=0,fcz=0;
  for (let i=0;i<N;i++){fcx+=pos[i].x;fcy+=pos[i].y;fcz+=pos[i].z;}
  fcx/=N;fcy/=N;fcz/=N;
  
  for (let i = 0; i < N; i++) {
    const p = pos[i], v = vel[i], pers = personality[i];
    acc[i].x=0; acc[i].y=0; acc[i].z=0;
    const nbs = findKNearest(i);
    
    // ── SEPARATION (from bird.js calculateSeparation) ──
    const effectiveRange = P.protectedRange * (1.1 - P.groupTension * 0.3);
    const prSq = effectiveRange * effectiveRange;
    let sepX=0,sepY=0,sepZ=0;
    for (const nb of nbs) {
      if (nb.dSq < prSq && nb.dSq > 0) {
        const j = nb.idx;
        const dx=p.x-pos[j].x, dy=p.y-pos[j].y, dz=p.z-pos[j].z;
        const d = Math.sqrt(nb.dSq);
        sepX += dx/(d*d); sepY += dy/(d*d); sepZ += dz/(d*d);
      }
    }
    const sepStr = P.separation * pers.aggressiveness;
    acc[i].x += sepX*sepStr; acc[i].y += sepY*sepStr; acc[i].z += sepZ*sepStr;
    
    if (nbs.length > 0) {
      // ── ALIGNMENT (weighted by confidence) ──
      let aliX=0,aliY=0,aliZ=0,wSum=0;
      for (const nb of nbs) {
        const j=nb.idx, w=1+confidence[j]+leadership[j];
        aliX+=vel[j].x*w; aliY+=vel[j].y*w; aliZ+=vel[j].z*w; wSum+=w;
      }
      if(wSum>0){aliX/=wSum;aliY/=wSum;aliZ/=wSum;}
      const aliStr = P.alignment * (pers.sociability + pers.followTendency) * (1-pers.independence*0.5);
      acc[i].x += (aliX-v.x)*aliStr; acc[i].y += (aliY-v.y)*aliStr; acc[i].z += (aliZ-v.z)*aliStr;
      
      // ── COHESION (toward 7-neighbor center + medium neighbors) ──
      let cohX=0,cohY=0,cohZ=0;
      for (const nb of nbs) { cohX+=pos[nb.idx].x; cohY+=pos[nb.idx].y; cohZ+=pos[nb.idx].z; }
      cohX/=nbs.length; cohY/=nbs.length; cohZ/=nbs.length;
      const cohStr = P.cohesion * pers.sociability * P.groupTension;
      acc[i].x += (cohX-p.x)*cohStr; acc[i].y += (cohY-p.y)*cohStr; acc[i].z += (cohZ-p.z)*cohStr;
      
      // ── SPEED MATCHING ──
      let avgNbSpd = 0;
      for (const nb of nbs) {
        const j=nb.idx;
        avgNbSpd += Math.sqrt(vel[j].x*vel[j].x+vel[j].y*vel[j].y+vel[j].z*vel[j].z);
      }
      avgNbSpd /= nbs.length;
      const mySpd = Math.sqrt(v.x*v.x+v.y*v.y+v.z*v.z);
      if (mySpd > 0.01) {
        const spdDiff = avgNbSpd - mySpd;
        acc[i].x += (v.x/mySpd)*spdDiff*0.1;
        acc[i].y += (v.y/mySpd)*spdDiff*0.1;
        acc[i].z += (v.z/mySpd)*spdDiff*0.1;
      }
    }
    
    // ── NOISE (curl-like) ──
    const nt = time * 0.001;
    const nx = Math.sin(p.x*0.02+nt*0.7+i*0.1)*Math.cos(p.z*0.015+nt*0.5);
    const ny = Math.sin(p.y*0.03+nt*0.3+i*0.2)*0.3;
    const nz = Math.cos(p.x*0.015+nt*0.6+i*0.15)*Math.sin(p.z*0.02+nt*0.4);
    const noiseStr = P.noiseIntensity * (pers.independence + 0.3);
    acc[i].x += nx*noiseStr; acc[i].y += ny*noiseStr; acc[i].z += nz*noiseStr;
    
    // ── FLOW FIELDS (from flock.js) ──
    for (const ff of flowFields) {
      const dx=p.x-ff.x, dy=p.y-ff.y, dz=p.z-ff.z;
      const dist = Math.sqrt(dx*dx+dy*dy+dz*dz);
      if (dist < ff.radius) {
        const influence = 1-(dist/ff.radius);
        acc[i].x += Math.cos(ff.angle)*Math.cos(ff.elev)*ff.strength*influence*pers.sociability*0.3;
        acc[i].y += Math.sin(ff.elev)*ff.strength*influence*pers.sociability*0.3;
        acc[i].z += Math.sin(ff.angle)*Math.cos(ff.elev)*ff.strength*influence*pers.sociability*0.3;
      }
    }
    
    // ── SPONTANEOUS DIRECTION CHANGE ──
    const timeSinceLast = time - lastDirChange[i];
    const changeChance = (pers.leaderChance + pers.independence) * 0.0001;
    if (timeSinceLast > 2000 && Math.random() < changeChance) {
      lastDirChange[i] = time;
      confidence[i] = Math.min(1, confidence[i] + 0.2);
      leadership[i] = Math.min(1, leadership[i] + 0.3);
      const a = Math.random()*Math.PI*2, e = (Math.random()-0.5)*0.4;
      const s = 0.5 + Math.random() * 1.0;
      acc[i].x += Math.cos(a)*Math.cos(e)*s;
      acc[i].y += Math.sin(e)*s*0.3;
      acc[i].z += Math.sin(a)*Math.cos(e)*s;
    }
    
    // ── INFORMATION CASCADE ──
    for (const nb of nbs) {
      const j=nb.idx;
      if (leadership[j] > 0.7) {
        const ls = Math.sqrt(vel[j].x*vel[j].x+vel[j].y*vel[j].y+vel[j].z*vel[j].z);
        if (ls > 0.01) {
          const f = leadership[j]*pers.followTendency*0.2;
          acc[i].x += (vel[j].x/ls)*f; acc[i].y += (vel[j].y/ls)*f; acc[i].z += (vel[j].z/ls)*f;
        }
      }
    }
    
    // ── VERTICAL DAMPING ──
    acc[i].y -= v.y * 0.04;
    
    // ── SOFT BOUNDARY (relative to flock center) ──
    const tfx=fcx-p.x, tfy=fcy-p.y, tfz=fcz-p.z;
    const fd = Math.sqrt(tfx*tfx+tfy*tfy+tfz*tfz);
    if (fd > 80) {
      const s = 0.1*(fd-80)/80;
      acc[i].x += (tfx/fd)*s; acc[i].y += (tfy/fd)*s; acc[i].z += (tfz/fd)*s;
    }
  }
  
  // ── APPLY WITH MOMENTUM ──
  for (let i = 0; i < N; i++) {
    mom[i].x = mom[i].x*0.95 + acc[i].x*0.05;
    mom[i].y = mom[i].y*0.95 + acc[i].y*0.05;
    mom[i].z = mom[i].z*0.95 + acc[i].z*0.05;
    
    vel[i].x += acc[i].x + mom[i].x;
    vel[i].y += acc[i].y + mom[i].y;
    vel[i].z += acc[i].z + mom[i].z;
    
    const maxSpd = P.maxSpeed * P.speedMultiplier * personality[i].energy;
    const minSpd = P.minSpeed * P.speedMultiplier;
    const spd = Math.sqrt(vel[i].x*vel[i].x+vel[i].y*vel[i].y+vel[i].z*vel[i].z);
    if(spd>maxSpd){const s=maxSpd/spd;vel[i].x*=s;vel[i].y*=s;vel[i].z*=s;}
    else if(spd<minSpd&&spd>0.001){const s=minSpd/spd;vel[i].x*=s;vel[i].y*=s;vel[i].z*=s;}
    
    pos[i].x += vel[i].x; pos[i].y += vel[i].y; pos[i].z += vel[i].z;
    confidence[i] *= 0.999;
    leadership[i] *= 0.995;
  }
}

// ═══ RENDERING ═══
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const skyCanvas = document.createElement('canvas');
skyCanvas.width = 1; skyCanvas.height = 512;
const skyCtx = skyCanvas.getContext('2d');
const grad = skyCtx.createLinearGradient(0, 0, 0, 512);
grad.addColorStop(0.0, '#1a0a2e');
grad.addColorStop(0.25, '#3d1560');
grad.addColorStop(0.45, '#8b3a62');
grad.addColorStop(0.6, '#d4726a');
grad.addColorStop(0.75, '#f0a06c');
grad.addColorStop(0.9, '#e8c89e');
grad.addColorStop(1.0, '#c9a882');
skyCtx.fillStyle = grad;
skyCtx.fillRect(0, 0, 1, 512);
scene.background = new THREE.CanvasTexture(skyCanvas);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 1000);

// Bird shape — small dark triangle
const bGeo = new THREE.BufferGeometry();
bGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array([
  0,0,-0.3, 0,0.06,-0.3, 0,0,0.5,
  0,0,-0.2, -0.4,0,0, 0,0,0.2,
  0,0,0.2, 0.4,0,0, 0,0,-0.2
]), 3));
bGeo.computeVertexNormals();
const bMat = new THREE.MeshBasicMaterial({ color: 0x0c0a08, side: THREE.DoubleSide });

const meshes = [];
for (let i = 0; i < N; i++) {
  const m = new THREE.Mesh(bGeo, bMat);
  m.frustumCulled = false;
  scene.add(m);
  meshes.push(m);
}

function animate() {
  requestAnimationFrame(animate);
  update();
  
  for (let i = 0; i < N; i++) {
    meshes[i].position.set(pos[i].x, pos[i].y, pos[i].z);
    const sp = Math.sqrt(vel[i].x*vel[i].x+vel[i].y*vel[i].y+vel[i].z*vel[i].z);
    if (sp > 0.01) meshes[i].lookAt(pos[i].x+vel[i].x, pos[i].y+vel[i].y, pos[i].z+vel[i].z);
  }
  
  // Camera follows flock center, very slow orbit
  let cx=0,cy=0,cz=0;
  for(let i=0;i<N;i++){cx+=pos[i].x;cy+=pos[i].y;cz+=pos[i].z;}
  cx/=N;cy/=N;cz/=N;
  const ct = performance.now() * 0.000015;
  camera.position.set(cx+Math.sin(ct)*150, cy+25, cz+Math.cos(ct)*150);
  camera.lookAt(cx,cy,cz);
  
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body></html>
