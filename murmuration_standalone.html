<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<title>Murmuration v3</title>
<style>body{margin:0;overflow:hidden;background:#000}canvas{display:block}</style>
</head><body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════
// STARLING MURMURATION
// No external forces. Shape changes emerge from internal
// perturbation waves propagating through 7-neighbor network.
// ═══════════════════════════════════════════════════════

const N = 600;
const K = 7;

// State
const px = new Float32Array(N), py = new Float32Array(N), pz = new Float32Array(N);
const vx = new Float32Array(N), vy = new Float32Array(N), vz = new Float32Array(N);

// Init — flock drifting in one direction
const initDir = Math.random() * Math.PI * 2;
for (let i = 0; i < N; i++) {
  px[i] = (Math.random() - 0.5) * 12;
  py[i] = (Math.random() - 0.5) * 5;
  pz[i] = (Math.random() - 0.5) * 12;
  const spd = 0.15 + Math.random() * 0.05;
  vx[i] = Math.cos(initDir) * spd + (Math.random() - 0.5) * 0.03;
  vy[i] = (Math.random() - 0.5) * 0.01;
  vz[i] = Math.sin(initDir) * spd + (Math.random() - 0.5) * 0.03;
}

// Neighbor scratch space
const _dist = new Float32Array(N);
const _nbs = new Int32Array(K);

function findKNearest(i) {
  for (let j = 0; j < N; j++) {
    if (j === i) { _dist[j] = 1e20; continue; }
    const dx = px[i]-px[j], dy = py[i]-py[j], dz = pz[i]-pz[j];
    _dist[j] = dx*dx + dy*dy + dz*dz;
  }
  for (let k = 0; k < K; k++) {
    let minV = 1e20, minI = 0;
    for (let j = 0; j < N; j++) {
      if (_dist[j] < minV) { minV = _dist[j]; minI = j; }
    }
    _nbs[k] = minI;
    _dist[minI] = 1e20;
  }
  return _nbs;
}

// ── PERTURBATION SYSTEM ──
// Random birds suddenly change direction.
// This propagates through the neighbor network = organic shape-shifting.
let perturbTimer = 0;
let nextPerturb = 60 + Math.random() * 120;

function triggerPerturbation() {
  // Pick a random bird as epicenter
  const center = Math.floor(Math.random() * N);
  const cx = px[center], cy = py[center], cz = pz[center];
  const radius = 3 + Math.random() * 5;
  const radiusSq = radius * radius;
  
  // Random impulse direction
  const angle = Math.random() * Math.PI * 2;
  const elev = (Math.random() - 0.5) * 0.3;
  const strength = 0.02 + Math.random() * 0.03;
  const ix = Math.cos(angle) * Math.cos(elev) * strength;
  const iy = Math.sin(elev) * strength * 0.3;
  const iz = Math.sin(angle) * Math.cos(elev) * strength;
  
  for (let i = 0; i < N; i++) {
    const dx = px[i]-cx, dy = py[i]-cy, dz = pz[i]-cz;
    const dSq = dx*dx + dy*dy + dz*dz;
    if (dSq < radiusSq) {
      const falloff = 1.0 - Math.sqrt(dSq) / radius;
      vx[i] += ix * falloff;
      vy[i] += iy * falloff;
      vz[i] += iz * falloff;
    }
  }
}

// ── PARAMETERS ──
const SEP_DIST = 1.2;
const SEP_DIST_SQ = SEP_DIST * SEP_DIST;
const INERTIA = 0.96;
const MIN_SPEED = 0.10;
const MAX_SPEED = 0.30;
const VERT_DAMP = 0.95;
const W_SEP = 0.08;
const W_ALIGN = 0.06;
const W_COH = 0.003;
const W_NOISE = 0.004;
const W_BOUNDARY = 0.0005;
const BOUNDARY_DIST = 50;

function update() {
  // Perturbations
  perturbTimer++;
  if (perturbTimer >= nextPerturb) {
    triggerPerturbation();
    perturbTimer = 0;
    nextPerturb = 40 + Math.random() * 100;
  }
  
  // Flock center for soft boundary
  let fcx=0, fcy=0, fcz=0;
  for (let i=0;i<N;i++) { fcx+=px[i]; fcy+=py[i]; fcz+=pz[i]; }
  fcx/=N; fcy/=N; fcz/=N;

  for (let i = 0; i < N; i++) {
    const nbs = findKNearest(i);
    let sepX=0, sepY=0, sepZ=0;
    let aliX=0, aliY=0, aliZ=0;
    let cohX=0, cohY=0, cohZ=0;
    
    for (let k = 0; k < K; k++) {
      const j = nbs[k];
      const dx=px[i]-px[j], dy=py[i]-py[j], dz=pz[i]-pz[j];
      const dSq = dx*dx + dy*dy + dz*dz;
      if (dSq < SEP_DIST_SQ && dSq > 0.0001) {
        const d = Math.sqrt(dSq);
        const f = (SEP_DIST - d) / SEP_DIST;
        sepX += (dx/d)*f; sepY += (dy/d)*f; sepZ += (dz/d)*f;
      }
      aliX += vx[j]; aliY += vy[j]; aliZ += vz[j];
      cohX += px[j]; cohY += py[j]; cohZ += pz[j];
    }
    aliX/=K; aliY/=K; aliZ/=K;
    cohX/=K; cohY/=K; cohZ/=K;
    
    let ax=0, ay=0, az=0;
    ax += sepX * W_SEP;
    ay += sepY * W_SEP;
    az += sepZ * W_SEP;
    ax += (aliX - vx[i]) * W_ALIGN;
    ay += (aliY - vy[i]) * W_ALIGN;
    az += (aliZ - vz[i]) * W_ALIGN;
    ax += (cohX - px[i]) * W_COH;
    ay += (cohY - py[i]) * W_COH;
    az += (cohZ - pz[i]) * W_COH;
    ax += (Math.random()-0.5) * W_NOISE;
    ay += (Math.random()-0.5) * W_NOISE * 0.2;
    az += (Math.random()-0.5) * W_NOISE;
    
    // Soft boundary relative to flock center
    const tfx=fcx-px[i], tfy=fcy-py[i], tfz=fcz-pz[i];
    const fd = Math.sqrt(tfx*tfx+tfy*tfy+tfz*tfz);
    if (fd > BOUNDARY_DIST) {
      const pull = (fd-BOUNDARY_DIST) * W_BOUNDARY;
      ax += (tfx/fd)*pull; ay += (tfy/fd)*pull; az += (tfz/fd)*pull;
    }
    
    ay -= vy[i] * (1-VERT_DAMP);
    
    vx[i] = vx[i]*INERTIA + (vx[i]+ax)*(1-INERTIA);
    vy[i] = vy[i]*INERTIA + (vy[i]+ay)*(1-INERTIA);
    vz[i] = vz[i]*INERTIA + (vz[i]+az)*(1-INERTIA);
    
    const speed = Math.sqrt(vx[i]*vx[i]+vy[i]*vy[i]+vz[i]*vz[i]);
    if (speed > MAX_SPEED) { const s=MAX_SPEED/speed; vx[i]*=s; vy[i]*=s; vz[i]*=s; }
    else if (speed < MIN_SPEED && speed > 0.001) { const s=MIN_SPEED/speed; vx[i]*=s; vy[i]*=s; vz[i]*=s; }
    
    px[i] += vx[i]; py[i] += vy[i]; pz[i] += vz[i];
  }
}

// ═══ RENDERING ═══
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const skyCanvas = document.createElement('canvas');
skyCanvas.width = 1; skyCanvas.height = 512;
const skyCtx = skyCanvas.getContext('2d');
const grad = skyCtx.createLinearGradient(0, 0, 0, 512);
grad.addColorStop(0.0, '#1a0a2e');
grad.addColorStop(0.3, '#5a2068');
grad.addColorStop(0.5, '#b06080');
grad.addColorStop(0.7, '#e8a070');
grad.addColorStop(1.0, '#d4a080');
skyCtx.fillStyle = grad;
skyCtx.fillRect(0, 0, 1, 512);
scene.background = new THREE.CanvasTexture(skyCanvas);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 500);

const bGeo = new THREE.BufferGeometry();
bGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array([
  0,0,-0.25, 0,0.05,-0.25, 0,0,0.4,
  0,0,-0.15, -0.35,0,0, 0,0,0.15,
  0,0,0.15, 0.35,0,0, 0,0,-0.15
]), 3));
bGeo.computeVertexNormals();
const bMat = new THREE.MeshBasicMaterial({ color: 0x0c0a08, side: THREE.DoubleSide });

const meshes = [];
for (let i = 0; i < N; i++) {
  const m = new THREE.Mesh(bGeo, bMat);
  m.frustumCulled = false;
  scene.add(m);
  meshes.push(m);
}

function animate() {
  requestAnimationFrame(animate);
  update();
  for (let i = 0; i < N; i++) {
    meshes[i].position.set(px[i], py[i], pz[i]);
    const sp = Math.sqrt(vx[i]*vx[i]+vy[i]*vy[i]+vz[i]*vz[i]);
    if (sp > 0.001) meshes[i].lookAt(px[i]+vx[i], py[i]+vy[i], pz[i]+vz[i]);
  }
  let cx=0,cy=0,cz=0;
  for (let i=0;i<N;i++){cx+=px[i];cy+=py[i];cz+=pz[i];}
  cx/=N;cy/=N;cz/=N;
  const ct = performance.now() * 0.000025;
  camera.position.set(cx+Math.sin(ct)*70, cy+15, cz+Math.cos(ct)*70);
  camera.lookAt(cx,cy,cz);
  renderer.render(scene, camera);
}
animate();
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body></html>
