<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<title>Murmuration v14</title>
<style>body{margin:0;overflow:hidden;background:#000}canvas{display:block}</style>
</head><body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════
// STARLING MURMURATION v14
// HIGH INERTIA velocity accumulation. NO Θ normalization.
// Birds keep their direction. Alignment is a gentle nudge.
// Different parts fly different ways → stretching, density
// variation, organic shape-shifting.
// ═══════════════════════════════════════════════════════

const N = 512;
const NC = 7;

// Speed
const TARGET_SPEED = 0.25;
const SPEED_CORRECT = 0.02; // 2% speed correction per step — very gentle

// Inertia: bird keeps this fraction of velocity, rest is nudge
const INERTIA = 0.985;
const NUDGE = 1 - INERTIA; // 0.015

// Nudge weights (these get multiplied by NUDGE, so effective is small)
const W_ALIGN = 0.5;     // very gentle nudge toward neighbors
const W_CENTER = 0.008;  // barely there — just enough to prevent infinite spread
const W_REPEL = 0.8;
const REPEL_DIST = 0.7;
const W_NOISE = 0.2;

const px = new Float32Array(N), py = new Float32Array(N), pz = new Float32Array(N);
const vx = new Float32Array(N), vy = new Float32Array(N), vz = new Float32Array(N);

// Start wide, all flying same direction
const d0 = Math.random() * Math.PI * 2;
for (let i = 0; i < N; i++) {
  const a = Math.random() * Math.PI * 2;
  const r = Math.sqrt(Math.random()) * 20;
  px[i] = Math.cos(a) * r;
  py[i] = (Math.random()-0.5) * 4;
  pz[i] = Math.sin(a) * r;
  const va = d0 + (Math.random()-0.5) * 0.4;
  vx[i] = Math.cos(va) * TARGET_SPEED;
  vy[i] = (Math.random()-0.5) * 0.005;
  vz[i] = Math.sin(va) * TARGET_SPEED;
}

// Spatial grid
const GS = 6;
const grid = new Map();
function buildGrid() {
  grid.clear();
  for (let i = 0; i < N; i++) {
    const k = ((px[i]/GS)|0)+','+((py[i]/GS)|0)+','+((pz[i]/GS)|0);
    if (!grid.has(k)) grid.set(k, []);
    grid.get(k).push(i);
  }
}
function getNearby(x,y,z) {
  const r=[];
  const gx=(x/GS)|0,gy=(y/GS)|0,gz=(z/GS)|0;
  for(let a=-2;a<=2;a++)for(let b=-1;b<=1;b++)for(let c=-2;c<=2;c++){
    const cell=grid.get((gx+a)+','+(gy+b)+','+(gz+c));
    if(cell)for(const i of cell)r.push(i);
  }
  return r;
}
function findK(i) {
  const near=getNearby(px[i],py[i],pz[i]);
  const c=[];
  for(const j of near){
    if(j===i)continue;
    const dx=px[i]-px[j],dy=py[i]-py[j],dz=pz[i]-pz[j];
    c.push({j,d2:dx*dx+dy*dy+dz*dz});
  }
  c.sort((a,b)=>a.d2-b.d2);
  return c.slice(0,NC);
}

// Edge perturbation
let pTimer=0, pNext=40;
function perturbEdge() {
  let fcx=0,fcy=0,fcz=0;
  for(let i=0;i<N;i++){fcx+=px[i];fcy+=py[i];fcz+=pz[i];}
  fcx/=N;fcy/=N;fcz/=N;
  
  let best=0,bestD=0;
  for(let s=0;s<40;s++){
    const i=(Math.random()*N)|0;
    const dx=px[i]-fcx,dz=pz[i]-fcz;
    if(dx*dx+dz*dz>bestD){bestD=dx*dx+dz*dz;best=i;}
  }
  
  // DIRECTLY set velocity of edge patch — bypasses inertia for the initiators
  const turnAngle = (Math.random()-0.5) * 2.5;
  const patchR = 3 + Math.random()*5;
  
  for(let i=0;i<N;i++){
    const dx=px[i]-px[best],dy=py[i]-py[best],dz=pz[i]-pz[best];
    const d=Math.sqrt(dx*dx+dy*dy+dz*dz);
    if(d<patchR){
      const f=1-(d/patchR);
      const ca=Math.atan2(vz[i],vx[i]);
      const na=ca+turnAngle*f*f;
      // Directly set — no inertia filtering for the perturbed birds
      vx[i]=Math.cos(na)*TARGET_SPEED;
      vz[i]=Math.sin(na)*TARGET_SPEED;
    }
  }
}

function update() {
  buildGrid();
  
  pTimer++;
  if(pTimer>=pNext){
    perturbEdge();
    pTimer=0;
    pNext=25+Math.random()*50;
  }
  
  // Flock center
  let fcx=0,fcy=0,fcz=0;
  for(let i=0;i<N;i++){fcx+=px[i];fcy+=py[i];fcz+=pz[i];}
  fcx/=N;fcy/=N;fcz/=N;
  
  for (let i = 0; i < N; i++) {
    // Compute desired nudge direction
    let nx=0,ny=0,nz=0;
    const nbs=findK(i);
    
    if(nbs.length>0){
      // Alignment — toward average neighbor VELOCITY (not just direction)
      let avx=0,avy=0,avz=0;
      for(const nb of nbs){avx+=vx[nb.j];avy+=vy[nb.j];avz+=vz[nb.j];}
      avx/=nbs.length;avy/=nbs.length;avz/=nbs.length;
      // Nudge = difference between avg neighbor vel and my vel
      nx += (avx-vx[i]) * W_ALIGN;
      ny += (avy-vy[i]) * W_ALIGN;
      nz += (avz-vz[i]) * W_ALIGN;
      
      // Collision avoidance
      for(const nb of nbs){
        const d=Math.sqrt(nb.d2);
        if(d<REPEL_DIST && d>0.01){
          const s=(REPEL_DIST-d)/REPEL_DIST;
          nx += (px[i]-px[nb.j])/d * s * W_REPEL;
          ny += (py[i]-py[nb.j])/d * s * W_REPEL * 0.2;
          nz += (pz[i]-pz[nb.j])/d * s * W_REPEL;
        }
      }
    }
    
    // Center pull
    const tox=fcx-px[i],toy=fcy-py[i],toz=fcz-pz[i];
    const fd=Math.sqrt(tox*tox+toy*toy+toz*toz);
    if(fd>0.1){
      nx += (tox/fd)*fd*W_CENTER;
      ny += (toy/fd)*fd*W_CENTER*0.2;
      nz += (toz/fd)*fd*W_CENTER;
    }
    
    // Noise
    const t=Math.random()*Math.PI*2;
    nx += Math.cos(t)*W_NOISE;
    nz += Math.sin(t)*W_NOISE;
    ny += (Math.random()-0.5)*W_NOISE*0.2;
    
    // Flatten
    ny -= vy[i]*2;
    ny -= (py[i]-fcy)*0.1;
    
    // HIGH INERTIA BLEND — bird keeps 98.5% of its velocity
    vx[i] = vx[i]*INERTIA + (vx[i]+nx)*NUDGE;
    vy[i] = vy[i]*INERTIA + (vy[i]+ny)*NUDGE;
    vz[i] = vz[i]*INERTIA + (vz[i]+nz)*NUDGE;
    
    // Soft speed regulation — gently push toward TARGET_SPEED
    const spd=Math.sqrt(vx[i]*vx[i]+vy[i]*vy[i]+vz[i]*vz[i]);
    if(spd>0.01){
      const adj=1+(TARGET_SPEED/spd-1)*SPEED_CORRECT;
      vx[i]*=adj;vy[i]*=adj;vz[i]*=adj;
    }
    
    // Move
    px[i]+=vx[i];py[i]+=vy[i];pz[i]+=vz[i];
  }
}

// ═══ RENDERING ═══
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
document.body.appendChild(renderer.domElement);

const scene=new THREE.Scene();
const sc=document.createElement('canvas');
sc.width=1;sc.height=512;
const sx=sc.getContext('2d');
const g=sx.createLinearGradient(0,0,0,512);
g.addColorStop(0.0,'#2a1540');g.addColorStop(0.3,'#5a2068');
g.addColorStop(0.5,'#b06080');g.addColorStop(0.65,'#d4726a');
g.addColorStop(0.8,'#f0a06c');g.addColorStop(1.0,'#c9a882');
sx.fillStyle=g;sx.fillRect(0,0,1,512);
scene.background=new THREE.CanvasTexture(sc);

const camera=new THREE.PerspectiveCamera(50,window.innerWidth/window.innerHeight,0.1,800);

const bGeo=new THREE.BufferGeometry();
bGeo.setAttribute('position',new THREE.BufferAttribute(new Float32Array([
  0,0,-0.12,0,0.025,-0.12,0,0,0.22,
  0,0,-0.06,-0.2,0,0,0,0,0.06,
  0,0,0.06,0.2,0,0,0,0,-0.06
]),3));
bGeo.computeVertexNormals();
const bMat=new THREE.MeshBasicMaterial({color:0x080604,side:THREE.DoubleSide});
const meshes=[];
for(let i=0;i<N;i++){
  const m=new THREE.Mesh(bGeo,bMat);
  m.frustumCulled=false;
  scene.add(m);
  meshes.push(m);
}

let camCx=0,camCy=0,camCz=0;
let fpsF=0,fpsL=performance.now();

function animate(){
  requestAnimationFrame(animate);
  update();update();update(); // 3 steps/frame for smooth motion
  
  for(let i=0;i<N;i++){
    meshes[i].position.set(px[i],py[i],pz[i]);
    const sp=Math.sqrt(vx[i]*vx[i]+vy[i]*vy[i]+vz[i]*vz[i]);
    if(sp>0.001)meshes[i].lookAt(px[i]+vx[i],py[i]+vy[i],pz[i]+vz[i]);
  }
  
  let cx=0,cy=0,cz=0;
  for(let i=0;i<N;i++){cx+=px[i];cy+=py[i];cz+=pz[i];}
  cx/=N;cy/=N;cz/=N;
  camCx+=(cx-camCx)*0.02;camCy+=(cy-camCy)*0.02;camCz+=(cz-camCz)*0.02;
  
  const ct=performance.now()*0.000008;
  camera.position.set(camCx+Math.sin(ct)*90,camCy+12,camCz+Math.cos(ct)*90);
  camera.lookAt(camCx,camCy,camCz);
  
  renderer.render(scene,camera);
  
  fpsF++;const now=performance.now();
  if(now-fpsL>1000){document.title='Murmuration — '+fpsF+'fps';fpsF=0;fpsL=now;}
}
animate();

window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>
</body></html>
